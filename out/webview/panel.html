<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCP Feedback Enhanced</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:var(--vscode-editor-background,#0d1117);
  --fg:var(--vscode-foreground,#c9d1d9);
  --fg-dim:var(--vscode-descriptionForeground,#6e7681);
  --border:var(--vscode-input-border,rgba(99,110,123,0.25));
  --input-bg:var(--vscode-input-background,#161b22);
  --btn-bg:#7c3aed;
  --btn-fg:#fff;
  --btn-hover:#6d28d9;
  --accent:#f59e0b;
  --accent-glow:rgba(245,158,11,0.15);
  --waiting-dot:#f59e0b;
  --success:#10b981;
  --danger:#ef4444;
  --ai-bubble:rgba(124,58,237,0.12);
  --user-bubble:rgba(16,185,129,0.12);
  --glow-purple:rgba(124,58,237,0.4);
  --glow-green:rgba(16,185,129,0.4);
  --surface:rgba(255,255,255,0.03);
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--fg);
  font-family:var(--vscode-font-family,'SF Mono','Cascadia Code','JetBrains Mono',monospace);
  font-size:13px;display:flex;flex-direction:column;height:100vh;
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(124,58,237,0.3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(124,58,237,0.5)}
@keyframes glow-pulse{
  0%,100%{opacity:1;box-shadow:0 0 4px currentColor}
  50%{opacity:.5;box-shadow:0 0 10px currentColor}
}
.status-bar{
  display:flex;align-items:center;gap:8px;padding:3px 12px;
  font-size:10px;color:var(--fg-dim);
  border-bottom:1px solid var(--border);
  background:var(--surface);
}
.messages{
  flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;
  gap:6px;
}
.msg-row{display:flex;animation:msg-in .25s ease-out}
.msg-row.ai{justify-content:flex-start}
.msg-row.user{justify-content:flex-end}
.msg-row.system{justify-content:center}
@keyframes msg-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.message{
  max-width:85%;padding:10px 14px;border-radius:14px;
  line-height:1.55;position:relative;
  transition:transform .15s;
}
.message:hover{transform:scale(1.005)}
.msg-row.ai .message{
  background:var(--ai-bubble);
  border:1px solid rgba(124,58,237,0.15);
  border-top-left-radius:4px;
}
.msg-row.user .message{
  background:var(--user-bubble);
  border:1px solid rgba(16,185,129,0.15);
  border-top-right-radius:4px;
}
.msg-row.system .message{
  background:transparent;
  font-size:11px;color:var(--fg-dim);
  padding:4px 12px;max-width:100%;
  letter-spacing:.3px;
  border:none;border-radius:0;
  font-weight:400;text-align:center;
  opacity:.7;
}
.hint-badge{
  display:inline-block;
  background:rgba(100,116,139,0.15);
  border:1px solid rgba(100,116,139,0.25);
  color:var(--fg-dim);font-size:9px;font-weight:500;
  padding:1px 6px;border-radius:8px;
  letter-spacing:.3px;margin-left:6px;
  vertical-align:middle;text-transform:uppercase;
}
.message .header{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--fg-dim);margin-bottom:5px;user-select:none}
.message .header .role{font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.msg-row.ai .message .header .role{color:#a78bfa}
.msg-row.user .message .header .role{color:#6ee7b7}
.message .content{word-break:break-word;user-select:text;-webkit-user-select:text}
.message .content code{background:rgba(110,118,129,0.15);padding:2px 5px;border-radius:4px;font-size:12px;font-family:inherit}
.message .content pre{background:rgba(0,0,0,0.3);padding:10px;border-radius:8px;overflow-x:auto;margin:8px 0;border:1px solid var(--border)}
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--fg-dim);text-align:center;padding:32px;gap:12px;
}
.empty-state .icon{
  font-size:42px;animation:float 3s ease-in-out infinite;
  filter:drop-shadow(0 0 12px rgba(124,58,237,0.3));
}
.empty-state .title{font-size:14px;font-weight:700;letter-spacing:1.5px;color:var(--fg)}
.empty-state .sub{font-size:11px;opacity:.5;max-width:240px;line-height:1.5}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.pending-section{
  margin:0 12px 8px;padding:10px 12px;
  background:var(--accent-glow);
  border:1px solid rgba(245,158,11,0.25);
  border-radius:10px;display:none;
  backdrop-filter:blur(4px);
}
.pending-section.visible{display:block;animation:msg-in .2s ease-out}
.pending-header{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--accent);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;font-weight:600}
.pending-header button{
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171;
  border-radius:6px;padding:3px 8px;cursor:pointer;font-size:12px;transition:all .15s;
}
.pending-header button:hover{background:rgba(239,68,68,0.2);color:#fca5a5}
.pending-item{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px}
.pending-item .text{flex:1;word-break:break-word}
.pending-item button{
  background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.3);color:var(--accent);
  border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;opacity:.8;
  transition:all .15s;min-width:28px;text-align:center;
}
.pending-item button:hover{opacity:1;background:rgba(245,158,11,0.15);transform:scale(1.05)}
.quick-replies{display:flex;gap:6px;padding:6px 12px;flex-wrap:wrap}
.quick-reply-btn{
  background:linear-gradient(135deg,rgba(124,58,237,0.06),rgba(16,185,129,0.06));
  border:1px solid rgba(124,58,237,0.2);color:var(--fg-dim);
  border-radius:20px;padding:5px 14px;cursor:pointer;font-size:11px;
  transition:all .25s cubic-bezier(.4,0,.2,1);letter-spacing:.3px;
  position:relative;overflow:hidden;
}
.quick-reply-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(16,185,129,0.1));
  opacity:0;transition:opacity .25s;
}
.quick-reply-btn:hover{
  border-color:var(--btn-bg);color:var(--fg);
  transform:translateY(-1px);
  box-shadow:0 2px 10px rgba(124,58,237,0.2);
}
.quick-reply-btn:hover::before{opacity:1}
.quick-reply-btn:active{transform:translateY(0);box-shadow:none}
.input-area{padding:8px 12px 10px;border-top:1px solid var(--border);background:var(--surface)}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{
  flex:1;min-height:76px;max-height:200px;resize:vertical;
  background:var(--input-bg);color:var(--fg);
  border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;font-family:inherit;font-size:13px;line-height:1.4;
  transition:border-color .2s,box-shadow .2s;
}
.input-row textarea:focus{outline:none;border-color:var(--btn-bg);box-shadow:0 0 0 2px rgba(124,58,237,0.15)}
.input-row textarea::placeholder{color:var(--fg-dim)}
.send-btn{
  background:linear-gradient(135deg,#7c3aed,#6d28d9);color:var(--btn-fg);
  border:none;border-radius:10px;padding:10px 18px;cursor:pointer;
  font-size:12px;font-weight:600;white-space:nowrap;
  letter-spacing:.5px;text-transform:uppercase;
  transition:all .2s;box-shadow:0 2px 8px rgba(124,58,237,0.3);
}
.send-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(124,58,237,0.4)}
.send-btn:active{transform:translateY(0)}
.send-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.send-btn.queue-mode{
  background:linear-gradient(135deg,rgba(245,158,11,0.1),rgba(251,191,36,0.05));
  color:var(--accent);
  border:1px solid rgba(245,158,11,0.3);box-shadow:none;
}
.send-btn.queue-mode:hover{
  border-color:var(--accent);color:#fbbf24;
  box-shadow:0 2px 10px rgba(245,158,11,0.2);transform:translateY(-1px);
}
.image-previews{display:flex;gap:8px;padding:6px 12px;flex-wrap:wrap}
.image-previews:empty{display:none}
.img-preview{
  position:relative;width:56px;height:56px;border-radius:8px;overflow:hidden;
  border:1px solid var(--border);transition:transform .15s;
}
.img-preview:hover{transform:scale(1.05)}
.img-preview img{width:100%;height:100%;object-fit:cover}
.img-preview .remove{
  position:absolute;top:-2px;right:-2px;width:18px;height:18px;
  background:rgba(239,68,68,0.9);color:#fff;border:none;border-radius:50%;
  font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  line-height:1;opacity:0;transition:opacity .15s;
}
.img-preview:hover .remove{opacity:1}
.input-actions{display:flex;flex-direction:column;gap:6px;align-items:stretch}
.attach-btn{
  background:transparent;border:1px solid var(--border);color:var(--fg-dim);
  border-radius:10px;padding:8px 10px;cursor:pointer;font-size:15px;line-height:1;
  transition:all .2s;display:flex;align-items:center;justify-content:center;
}
.attach-btn:hover{color:var(--fg);border-color:var(--btn-bg);box-shadow:0 0 8px rgba(124,58,237,0.15)}
.message .content img{max-width:200px;max-height:150px;border-radius:8px;margin:6px 0;cursor:zoom-in;display:block;transition:opacity .15s}
.message .content img:hover{opacity:.85}
.lightbox{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.9);backdrop-filter:blur(8px);
  z-index:999;align-items:center;justify-content:center;cursor:zoom-out;
}
.lightbox.visible{display:flex}
.lightbox img{max-width:95vw;max-height:95vh;border-radius:10px;box-shadow:0 0 60px rgba(0,0,0,.7)}
.settings-toggle{margin-left:auto;flex-shrink:0}
.settings-toggle button{
  background:var(--surface);border:1px solid var(--border);color:var(--fg-dim);
  cursor:pointer;font-size:14px;padding:3px 8px;
  transition:all .2s;border-radius:6px;
}
.settings-toggle button:hover{
  color:var(--fg);border-color:rgba(124,58,237,0.4);
  background:rgba(124,58,237,0.08);
  box-shadow:0 0 8px rgba(124,58,237,0.15);
}
.settings-panel{
  display:none;
  margin:6px 10px;padding:0;
  border:1px solid rgba(124,58,237,0.3);
  border-radius:12px;overflow:hidden;
  background:var(--input-bg);
  box-shadow:0 4px 20px rgba(0,0,0,0.3),0 0 1px rgba(124,58,237,0.3);
}
.settings-panel.visible{display:block;animation:settings-in .25s ease-out}
@keyframes settings-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.settings-panel-title{
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:#a78bfa;padding:10px 14px 8px;
  background:linear-gradient(135deg,rgba(124,58,237,0.12),rgba(124,58,237,0.04));
  border-bottom:1px solid rgba(124,58,237,0.15);
}
.settings-panel-body{padding:10px 14px 12px}
.settings-panel label{
  display:flex;align-items:center;gap:10px;font-size:12px;margin-bottom:6px;
  cursor:pointer;padding:7px 10px;border-radius:8px;
  border:1px solid transparent;transition:all .15s;
}
.settings-panel label:hover{background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.12)}
.settings-panel input[type="checkbox"]{
  accent-color:#7c3aed;width:15px;height:15px;cursor:pointer;
}
.settings-panel input[type="text"]{
  width:100%;background:rgba(0,0,0,0.2);color:var(--fg);
  border:1px solid var(--border);border-radius:8px;padding:6px 12px;
  font-size:12px;margin-top:4px;transition:all .2s;
}
.settings-panel input[type="text"]:focus{border-color:var(--btn-bg);outline:none;box-shadow:0 0 0 2px rgba(124,58,237,0.12)}
.at-dropdown{
  display:none;position:absolute;bottom:100%;left:0;right:0;
  max-height:240px;overflow-y:auto;z-index:100;
  background:var(--input-bg);border:1px solid var(--border);
  border-radius:10px 10px 0 0;margin-bottom:-1px;
  box-shadow:0 -4px 20px rgba(0,0,0,0.3),0 0 1px rgba(124,58,237,0.3);
  backdrop-filter:blur(12px);
}
.at-dropdown.visible{display:block;animation:at-in .15s ease-out}
@keyframes at-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.at-dropdown-item{
  display:flex;align-items:center;gap:8px;padding:7px 12px;
  cursor:pointer;font-size:12px;transition:background .1s;
}
.at-dropdown-item:hover,.at-dropdown-item.active{
  background:rgba(124,58,237,0.12);
}
.at-dropdown-item .kind-icon{
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;opacity:.7;
  background:rgba(124,58,237,0.08);border-radius:5px;
}
.at-dropdown-item .at-label{color:var(--fg);font-weight:500}
.at-dropdown-item .at-detail{color:var(--fg-dim);font-size:10px;margin-left:auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:50%}
.ws-info{display:flex;align-items:center;gap:6px}
.ws-status{
  display:flex;align-items:center;gap:5px;cursor:pointer;
  padding:1px 7px;border-radius:10px;
  transition:background .2s;user-select:none;
}
.ws-status:hover{background:rgba(255,255,255,0.06)}
.ws-status-dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
  transition:background .3s,box-shadow .3s;
}
.ws-status-label{font-size:10px;letter-spacing:.3px;transition:color .3s}
.ws-status[data-state="connected"] .ws-status-dot{background:var(--success);box-shadow:0 0 6px var(--glow-green)}
.ws-status[data-state="connected"] .ws-status-label{color:var(--success)}
.ws-status[data-state="connecting"] .ws-status-dot{background:var(--accent);animation:glow-pulse 1.5s ease-in-out infinite}
.ws-status[data-state="connecting"] .ws-status-label{color:var(--accent)}
.ws-status[data-state="disconnected"] .ws-status-dot{background:var(--danger);box-shadow:0 0 4px rgba(239,68,68,0.4)}
.ws-status[data-state="disconnected"] .ws-status-label{color:var(--danger)}
.ws-port{font-size:9px;opacity:.4;font-family:monospace}
.ws-reconnect-btn{
  background:transparent;border:1px solid var(--border);color:var(--fg-dim);
  cursor:pointer;font-size:12px;padding:1px 6px;border-radius:6px;
  transition:all .2s;line-height:1;
}
.ws-reconnect-btn:hover{color:var(--fg);border-color:rgba(124,58,237,0.4);background:rgba(124,58,237,0.08)}
.session-tabs{
  display:flex;gap:4px;padding:4px 10px 0;overflow-x:auto;overflow-y:hidden;flex-wrap:nowrap;flex-shrink:0;
  border-bottom:1px solid var(--border);background:var(--surface);
  min-height:32px;max-height:32px;scrollbar-width:none;-ms-overflow-style:none;
}
.session-tabs::-webkit-scrollbar{display:none;height:0;width:0}
.session-tabs-actions{
  display:flex;align-items:center;gap:4px;padding:4px 6px 0;flex-shrink:0;
  border-bottom:1px solid var(--border);background:var(--surface);
}
.session-tabs-actions button{
  background:transparent;border:1px solid var(--border);color:var(--fg-dim);
  cursor:pointer;font-size:10px;padding:3px 8px;border-radius:6px;white-space:nowrap;
}
.session-tabs-actions button:hover{color:var(--fg);border-color:rgba(124,58,237,0.4)}
.session-tabs-row{display:flex;align-items:stretch;flex-shrink:0}
.session-tabs:empty{display:none}
.session-tab{
  display:flex;align-items:center;gap:5px;padding:5px 10px;
  border:1px solid transparent;border-bottom:none;
  border-radius:8px 8px 0 0;cursor:pointer;font-size:11px;
  color:var(--fg-dim);white-space:nowrap;max-width:160px;
  transition:all .15s;position:relative;top:1px;
}
.session-tab:hover{background:rgba(124,58,237,0.08);color:var(--fg)}
.session-tab.active{
  background:var(--input-bg);color:var(--fg);
  border-color:var(--border);font-weight:600;
}
.session-tab .tab-dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
  background:var(--accent);box-shadow:0 0 4px var(--accent);
}
.session-tab.resolved .tab-dot{background:var(--success);box-shadow:0 0 4px var(--glow-green)}
.session-tab .tab-label{overflow:hidden;text-overflow:ellipsis}
.session-tab .tab-close{
  display:flex;align-items:center;justify-content:center;
  width:14px;height:14px;margin-left:2px;border:none;border-radius:4px;
  background:transparent;color:var(--fg-dim);cursor:pointer;font-size:12px;line-height:1;
  opacity:0;flex-shrink:0;padding:0;
}
.session-tab:hover .tab-close,.session-tab.active .tab-close{opacity:1}
.session-tab .tab-close:hover{background:rgba(239,68,68,0.15);color:var(--danger)}
.tab-context-menu{
  display:none;position:fixed;z-index:300;min-width:160px;
  background:var(--input-bg);border:1px solid var(--border);border-radius:8px;
  box-shadow:0 8px 24px rgba(0,0,0,0.35);padding:4px 0;
}
.tab-context-menu.visible{display:block}
.tab-context-menu button{
  display:block;width:100%;text-align:left;background:transparent;border:none;
  color:var(--fg);padding:8px 12px;font-size:12px;cursor:pointer;
}
.tab-context-menu button:hover{background:rgba(124,58,237,0.12)}
.clipboard-toast{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
  background:rgba(16,185,129,0.92);color:#fff;padding:6px 14px;border-radius:8px;
  font-size:11px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:200;
}
.clipboard-toast.visible{opacity:1}
</style>
</head>
<body>

<div class="status-bar" id="statusBar">
  <span id="versionLabel" style="opacity:.5;font-size:10px">v2.1.0</span>
  <div class="ws-info">
    <div id="wsStatus" class="ws-status" data-state="disconnected" title="Click to reconnect">
      <span class="ws-status-dot"></span>
      <span class="ws-status-label" id="wsStatusLabel">Disconnected</span>
    </div>
    <span class="ws-port" id="wsPort"></span>
    <button class="ws-reconnect-btn" id="wsReconnectBtn" title="Force reconnect">&#8635;</button>
  </div>
  <div style="flex:1"></div>
  <div class="settings-toggle"><button id="settingsBtn" title="Settings">&#9881;</button></div>
</div>
<div class="settings-panel" id="settingsPanel">
  <div class="settings-panel-title">&#9881; Settings</div>
  <div class="settings-panel-body">
    <label><input type="checkbox" id="autoReplyCheck"> Auto-reply when agent asks</label>
    <input type="text" id="autoReplyText" placeholder="Auto-reply text" value="Continue">
  </div>
</div>

<div class="session-tabs-row">
  <div class="session-tabs" id="sessionTabs"></div>
  <div class="session-tabs-actions" id="sessionTabsActions">
    <button type="button" id="closeResolvedBtn" title="Close all resolved tabs">Close resolved</button>
  </div>
</div>
<div class="tab-context-menu" id="tabContextMenu"></div>

<div class="messages" id="messages">
  <div class="empty-state" id="emptyState">
    <div class="icon">&#9889;</div>
    <div class="title">AWAITING SIGNAL</div>
    <div class="sub">Agent will connect when it calls interactive_feedback</div>
    <div class="sub">Each tab = one agent session. Orange dot = waiting for your reply</div>
  </div>
</div>

<div class="pending-section" id="pendingSection">
  <div class="pending-header">
    <span>Pending (<span id="pendingCount">0</span>)</span>
    <button id="clearPendingBtn" title="Clear all">&#10005;</button>
  </div>
  <div id="pendingList"></div>
</div>

<div class="quick-replies" id="quickReplies">
  <button class="quick-reply-btn" data-text="Continue">&#9654; Continue</button>
  <button class="quick-reply-btn" data-text="Looks good, proceed">&#10003; LGTM</button>
  <button class="quick-reply-btn" data-text="Please fix the issues">&#9889; Fix</button>
  <button class="quick-reply-btn" data-text="Stop, let me review first">&#9632; Pause</button>
</div>

<div class="image-previews" id="imagePreviews"></div>
<div class="input-area" style="position:relative">
  <div class="at-dropdown" id="atDropdown"></div>
  <div class="input-row">
    <textarea id="input" placeholder="Type your feedback... (paste image with Cmd+V, @ to reference files)" rows="4"></textarea>
    <div class="input-actions">
      <button class="attach-btn" id="attachBtn" title="Attach image file">&#128206;</button>
      <button class="send-btn" id="sendBtn" disabled>Queue</button>
    </div>
  </div>
</div>
<input type="file" id="fileInput" accept="image/*" multiple style="display:none">
<div class="lightbox" id="lightbox"><img id="lightboxImg" src=""></div>

<!-- panelState.js -->
<script>
/**
 * Multi-session PanelState — testable, no DOM/WebSocket side effects.
 */
(function (exports) {
  'use strict'

  function wsSend(message) {
    return { type: 'ws_send', message }
  }

  function render() {
    return { type: 'render', targets: Array.from(arguments) }
  }

  function dom(action, value) {
    return { type: 'dom', action, value }
  }

  function notify(message) {
    return { type: 'notify', message }
  }

  function createSession(id, label, summary) {
    return {
      id: id,
      label: label || '',
      summary: summary || '',
      messages: [],
      pendingQueue: [],
      pendingImages: [],
      inputDraft: '',
      stagedImages: [],
      waiting: true,
      createdAt: Date.now(),
    }
  }

  function tabTitle(session) {
    if (session.label) return session.label
    return 'Chat ' + String(session.id).slice(-6)
  }

  class PanelState {
    constructor() {
      this.sessions = {}
      this.sessionOrder = []
      this.activeSessionId = null
      this.autoReply = false
      this.autoReplyText = 'Continue'
      this.globalPendingQueue = []
      this.globalPendingImages = []
    }

    getActiveSession() {
      if (!this.activeSessionId) return null
      return this.sessions[this.activeSessionId] || null
    }

    ensureSession(id, label, summary) {
      if (!id) return null
      if (!this.sessions[id]) {
        this.sessions[id] = createSession(id, label, summary)
        this.sessionOrder.push(id)
      } else {
        if (label) this.sessions[id].label = label
        if (summary) this.sessions[id].summary = summary
        this.sessions[id].waiting = true
      }
      return this.sessions[id]
    }

    setActiveSession(id) {
      if (!id || !this.sessions[id]) return []
      this.activeSessionId = id
      var s = this.sessions[id]
      return [render('tabs', 'messages', 'pending', 'input'), dom('set_input', s.inputDraft || '')]
    }

    _afterSessionListChange() {
      var active = this.getActiveSession()
      return [
        render('tabs', 'messages', 'pending', 'input'),
        dom('set_input', active ? active.inputDraft || '' : ''),
        dom('save_state'),
      ]
    }

    _adoptActiveIfNeeded(removedIds) {
      if (removedIds.indexOf(this.activeSessionId) < 0) return
      var remaining = []
      for (var i = 0; i < this.sessionOrder.length; i++) {
        var sid = this.sessionOrder[i]
        if (removedIds.indexOf(sid) < 0 && this.sessions[sid]) remaining.push(sid)
      }
      this.activeSessionId = remaining.length ? remaining[remaining.length - 1] : null
    }

    closeSession(id) {
      if (!id || !this.sessions[id]) return []
      delete this.sessions[id]
      var idx = this.sessionOrder.indexOf(id)
      if (idx >= 0) this.sessionOrder.splice(idx, 1)
      this._adoptActiveIfNeeded([id])
      return this._afterSessionListChange()
    }

    closeOtherSessions(id) {
      if (!id || !this.sessions[id]) return []
      var keep = this.sessions[id]
      this.sessions = {}
      this.sessions[id] = keep
      this.sessionOrder = [id]
      this.activeSessionId = id
      return this._afterSessionListChange()
    }

    closeSessionsToLeft(id) {
      if (!id || !this.sessions[id]) return []
      var idx = this.sessionOrder.indexOf(id)
      if (idx <= 0) return []
      var removed = this.sessionOrder.slice(0, idx)
      for (var i = 0; i < removed.length; i++) delete this.sessions[removed[i]]
      this.sessionOrder = this.sessionOrder.slice(idx)
      this._adoptActiveIfNeeded(removed)
      return this._afterSessionListChange()
    }

    closeResolvedSessions() {
      var removed = []
      for (var i = this.sessionOrder.length - 1; i >= 0; i--) {
        var sid = this.sessionOrder[i]
        if (this.sessions[sid] && !this.sessions[sid].waiting) {
          removed.push(sid)
          delete this.sessions[sid]
          this.sessionOrder.splice(i, 1)
        }
      }
      if (!removed.length) return []
      this._adoptActiveIfNeeded(removed)
      return this._afterSessionListChange()
    }

    get waitingCount() {
      var n = 0
      for (var i = 0; i < this.sessionOrder.length; i++) {
        var s = this.sessions[this.sessionOrder[i]]
        if (s && s.waiting) n++
      }
      return n
    }

    get panelMode() {
      var active = this.getActiveSession()
      if (active && active.waiting) return 'waiting'
      if (this.waitingCount > 0) return 'waiting-other'
      return 'idle'
    }

    handleMessage(msg) {
      if (!msg || typeof msg !== 'object' || !msg.type) return []
      switch (msg.type) {
        case 'connection_established':
          return [wsSend({ type: 'get_state' })]
        case 'state_sync':
          return this._onStateSync(msg)
        case 'session_updated':
          return this._onSessionUpdated(msg)
        case 'feedback_submitted':
          return this._onFeedbackSubmitted(msg)
        case 'pending_delivered':
          return this._onPendingDelivered(msg)
        case 'pending_synced':
          return this._onPendingSynced(msg)
        case 'pong':
        case 'status_update':
          return []
        default:
          return []
      }
    }

    _onStateSync(msg) {
      var pending = msg.pending_sessions || []
      for (var i = 0; i < pending.length; i++) {
        var p = pending[i]
        this.ensureSession(p.id, p.label, p.summary)
        if (p.summary) {
          var sess = this.sessions[p.id]
          if (!sess.messages.length || sess.messages[sess.messages.length - 1].role !== 'ai') {
            sess.messages.push({
              role: 'ai',
              content: p.summary,
              timestamp: new Date().toISOString(),
            })
          }
        }
      }
      if (!this.activeSessionId && this.sessionOrder.length > 0) {
        this.activeSessionId = this.sessionOrder[this.sessionOrder.length - 1]
      }
      this.globalPendingQueue = msg.pending_comments || []
      this.globalPendingImages = msg.pending_images || []
      return [render('tabs', 'messages', 'pending', 'input'), dom('save_state')]
    }

    _onSessionUpdated(msg) {
      var id = msg.session_id
      if (!id) return this._onSessionUpdatedLegacy(msg)

      var sess = this.ensureSession(id, msg.session_label, msg.summary)
      this.activeSessionId = id
      sess.messages.push({
        role: 'ai',
        content: msg.summary || '',
        timestamp: new Date().toISOString(),
      })

      var cmds = [
        render('tabs', 'messages', 'pending', 'input'),
        dom('save_state'),
        notify({ type: 'new-session', session_id: id }),
      ]

      if (sess.pendingQueue.length > 0 || sess.pendingImages.length > 0) {
        var combined = sess.pendingQueue.join('\n\n')
        var images = sess.pendingImages.length > 0 ? sess.pendingImages.slice() : []
        sess.pendingQueue = []
        sess.pendingImages = []
        return {
          commands: cmds.concat([render('pending')]),
          autoSubmit: { session_id: id, text: combined || '(image)', images: images },
        }
      }

      if (this.globalPendingQueue.length > 0 || this.globalPendingImages.length > 0) {
        var gCombined = this.globalPendingQueue.join('\n\n')
        var gImages =
          this.globalPendingImages.length > 0 ? this.globalPendingImages.slice() : []
        this.globalPendingQueue = []
        this.globalPendingImages = []
        cmds.push(render('pending'))
        cmds.push(wsSend({ type: 'queue-pending', comments: [], images: [] }))
        return {
          commands: cmds,
          autoSubmit: { session_id: id, text: gCombined || '(image)', images: gImages },
        }
      }

      if (this.autoReply && this.autoReplyText) {
        return {
          commands: cmds,
          autoReply: { session_id: id, text: this.autoReplyText, delay: 500 },
        }
      }

      return cmds
    }

    _onSessionUpdatedLegacy(msg) {
      var legacyId = 'legacy-' + Date.now().toString(36)
      return this._onSessionUpdated({
        type: 'session_updated',
        session_id: legacyId,
        session_label: '',
        summary: msg.summary || '',
      })
    }

    _onFeedbackSubmitted(msg) {
      var id = msg.session_id || this.activeSessionId
      if (!id || !this.sessions[id]) return [render('tabs', 'messages', 'input')]

      var sess = this.sessions[id]
      if (msg.feedback) {
        var last = sess.messages[sess.messages.length - 1]
        var alreadyHas = last && last.role === 'user' && last.content === msg.feedback
        if (!alreadyHas) {
          sess.messages.push({
            role: 'user',
            content: msg.feedback,
            timestamp: new Date().toISOString(),
          })
        }
      }
      sess.waiting = false
      return [render('tabs', 'messages', 'input'), dom('save_state')]
    }

    _onPendingDelivered(msg) {
      var id = this.activeSessionId
      if (!id || !this.sessions[id]) return []
      var sess = this.sessions[id]
      var comments = msg.comments || []
      var images = msg.images || []
      sess.messages.push({
        role: 'user',
        content: comments.join('\n\n') || '',
        timestamp: new Date().toISOString(),
        pending_delivered: true,
        images: images.length > 0 ? images : undefined,
      })
      sess.pendingQueue = []
      sess.pendingImages = []
      return [render('messages', 'pending'), dom('save_state')]
    }

    _onPendingSynced(msg) {
      this.globalPendingQueue = msg.comments || []
      if (msg.images !== undefined) this.globalPendingImages = msg.images
      return [render('pending'), dom('save_state')]
    }

    smartSend(text, images) {
      var active = this.getActiveSession()
      if (active && active.waiting) return this.submitFeedback(text, images)
      return this.addToPending(text, images)
    }

    submitFeedback(text, images, opts) {
      var id = (opts && opts.session_id) || this.activeSessionId
      var sess = id ? this.sessions[id] : null
      if (!sess || !sess.waiting) return []

      sess.messages.push({
        role: 'user',
        content: text || '',
        timestamp: new Date().toISOString(),
        images: images && images.length > 0 ? images : undefined,
      })
      sess.waiting = false

      var cmds = [
        wsSend({
          type: 'feedback_response',
          session_id: id,
          feedback: text || '',
          images: images || [],
        }),
        render('tabs', 'messages', 'input'),
      ]

      if (!opts || !opts.preserveInput) {
        sess.stagedImages = []
        sess.inputDraft = ''
        cmds.push(dom('clear_input'))
        cmds.push(dom('clear_staged_images'))
      }

      cmds.push(dom('save_state'))
      cmds.push(notify({ type: 'feedback-submitted', session_id: id }))
      return cmds
    }

    addToPending(text, images) {
      var hasText = text && text.trim()
      var hasImages = images && images.length > 0
      if (!hasText && !hasImages) return []

      var active = this.getActiveSession()
      if (active && active.waiting) {
        if (hasText) active.pendingQueue.push(text.trim())
        if (hasImages) active.pendingImages = active.pendingImages.concat(images)
      } else {
        if (hasText) this.globalPendingQueue.push(text.trim())
        if (hasImages) this.globalPendingImages = this.globalPendingImages.concat(images)
        return [
          wsSend({
            type: 'queue-pending',
            comments: this.globalPendingQueue,
            images: this.globalPendingImages,
          }),
          render('pending'),
          dom('clear_input'),
          dom('clear_staged_images'),
          dom('save_state'),
        ]
      }

      active.stagedImages = []
      active.inputDraft = ''
      return [
        render('pending'),
        dom('clear_input'),
        dom('clear_staged_images'),
        dom('save_state'),
      ]
    }

    editPending(idx) {
      var active = this.getActiveSession()
      var q = active && active.waiting ? active.pendingQueue : this.globalPendingQueue
      if (idx < 0 || idx >= q.length) return []
      var text = q[idx]
      q.splice(idx, 1)
      if (active && active.waiting) {
        return [render('pending'), dom('set_input', text), dom('focus_input'), dom('save_state')]
      }
      return [
        wsSend({
          type: 'queue-pending',
          comments: this.globalPendingQueue,
          images: this.globalPendingImages,
        }),
        render('pending'),
        dom('set_input', text),
        dom('focus_input'),
        dom('save_state'),
      ]
    }

    removePending(idx) {
      var active = this.getActiveSession()
      var q = active && active.waiting ? active.pendingQueue : this.globalPendingQueue
      if (idx < 0 || idx >= q.length) return []
      q.splice(idx, 1)
      if (active && active.waiting) {
        return [render('pending'), dom('save_state')]
      }
      return [
        wsSend({
          type: 'queue-pending',
          comments: this.globalPendingQueue,
          images: this.globalPendingImages,
        }),
        render('pending'),
        dom('save_state'),
      ]
    }

    clearPending() {
      var active = this.getActiveSession()
      if (active && active.waiting) {
        active.pendingQueue = []
        active.pendingImages = []
        return [render('pending'), dom('save_state')]
      }
      this.globalPendingQueue = []
      this.globalPendingImages = []
      return [
        wsSend({ type: 'queue-pending', comments: [], images: [] }),
        render('pending'),
        dom('save_state'),
      ]
    }

    clearPendingImages() {
      var active = this.getActiveSession()
      if (active && active.waiting) {
        if (active.pendingImages.length === 0) return []
        active.pendingImages = []
        return [render('pending'), dom('save_state')]
      }
      if (this.globalPendingImages.length === 0) return []
      this.globalPendingImages = []
      return [
        wsSend({
          type: 'queue-pending',
          comments: this.globalPendingQueue,
          images: [],
        }),
        render('pending'),
        dom('save_state'),
      ]
    }

    stageImage(base64) {
      var active = this.getActiveSession()
      if (!active) return []
      active.stagedImages.push(base64)
      return [render('staged_images'), dom('update_send_button')]
    }

    unstageImage(idx) {
      var active = this.getActiveSession()
      if (!active || idx < 0 || idx >= active.stagedImages.length) return []
      active.stagedImages.splice(idx, 1)
      return [render('staged_images'), dom('update_send_button')]
    }

    getStagedImages() {
      var active = this.getActiveSession()
      return active ? active.stagedImages : []
    }

    setAutoReply(enabled, text) {
      this.autoReply = !!enabled
      if (text !== undefined) this.autoReplyText = text
      return [dom('save_state')]
    }

    getUIState() {
      var active = this.getActiveSession()
      var waiting = !!(active && active.waiting)
      return {
        buttonMode: waiting ? 'send' : 'queue',
        isWaiting: waiting,
        waitingCount: this.waitingCount,
        activeSessionId: this.activeSessionId,
      }
    }

    serialize() {
      return {
        sessions: this.sessions,
        sessionOrder: this.sessionOrder,
        activeSessionId: this.activeSessionId,
        globalPendingQueue: this.globalPendingQueue,
        globalPendingImages: this.globalPendingImages,
        autoReply: this.autoReply,
        autoReplyText: this.autoReplyText,
      }
    }

    deserialize(data) {
      if (!data) return
      this.sessions = data.sessions || {}
      this.sessionOrder = data.sessionOrder || []
      this.activeSessionId = data.activeSessionId || null
      this.globalPendingQueue = data.globalPendingQueue || []
      this.globalPendingImages = data.globalPendingImages || []
      this.autoReply = data.autoReply || false
      this.autoReplyText = data.autoReplyText || 'Continue'
    }

    static md(text) {
      if (!text) return ''
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^## (.+)$/gm, '<h3>$1</h3>')
        .replace(/^# (.+)$/gm, '<h2>$1</h2>')
        .replace(/^- (.+)$/gm, '\u2022 $1<br>')
        .replace(/\n/g, '<br>')
    }

    /** Convert rendered message HTML to plain text for clipboard (testable). */
    static htmlToPlainText(html) {
      if (!html) return ''
      return String(html)
        .replace(/<br\s*\/?>/gi, '\n')
        .replace(/<\/h[1-6]>/gi, '\n')
        .replace(/<\/pre>/gi, '\n')
        .replace(/<[^>]+>/g, '')
        .replace(/&amp;/g, '&')

    }

    /** Prefer markdown source; fall back to rendered HTML. */
    static plainCopyText(markdownSource, renderedHtml) {
      if (markdownSource) return markdownSource
      return PanelState.htmlToPlainText(renderedHtml)
    }

    static selectionCopyText(selected, raw, fullTextLen) {
      if (!selected) return raw || ''
      if (raw && fullTextLen > 0 && selected.length >= fullTextLen * 0.8) return raw
      return selected

    /** Extract image files from ClipboardData; prefer items over files to avoid duplicates. */
    static extractClipboardImages(clipboardData) {
      var images = []
      if (!clipboardData) return images
      if (clipboardData.items) {
        for (var i = 0; i < clipboardData.items.length; i++) {
          var item = clipboardData.items[i]
          if (item.type && item.type.indexOf('image/') === 0) {
            var file = item.getAsFile && item.getAsFile()
            if (file) images.push(file)

      if (images.length) return images
      if (clipboardData.files) {

<script>
const SERVER_URL = '{{SERVER_URL}}';
const PROJECT_PATH = '{{PROJECT_PATH}}';

(function () {
    'use strict';

    var PS = window.PanelStateModule || (typeof PanelState !== 'undefined' ? { PanelState: PanelState } : null);
    if (!PS) { console.error('PanelState not loaded'); return; }

    var state = new PS.PanelState();
    var vscode = typeof acquireVsCodeApi === 'function' ? acquireVsCodeApi() : null;

    var messagesEl = document.getElementById('messages');
    var sessionTabsEl = document.getElementById('sessionTabs');
    var tabContextMenu = document.getElementById('tabContextMenu');
    var closeResolvedBtn = document.getElementById('closeResolvedBtn');
    var emptyState = document.getElementById('emptyState');
    var pendingSection = document.getElementById('pendingSection');
    var pendingCountEl = document.getElementById('pendingCount');
    var pendingList = document.getElementById('pendingList');
    var clearPendingBtn = document.getElementById('clearPendingBtn');
    var quickReplies = document.getElementById('quickReplies');
    var inputEl = document.getElementById('input');
    var sendBtn = document.getElementById('sendBtn');
    var settingsBtn = document.getElementById('settingsBtn');
    var settingsPanel = document.getElementById('settingsPanel');
    var autoReplyCheck = document.getElementById('autoReplyCheck');
    var autoReplyText = document.getElementById('autoReplyText');
    var atDropdown = document.getElementById('atDropdown');
    var lightbox = document.getElementById('lightbox');
    var lightboxImg = document.getElementById('lightboxImg');
    var imagePreviews = document.getElementById('imagePreviews');
    var attachBtn = document.getElementById('attachBtn');
    var fileInput = document.getElementById('fileInput');

    var ws = null;
    var reconnectAttempts = 0;

    var wsStatusEl = document.getElementById('wsStatus');
    var wsStatusLabel = document.getElementById('wsStatusLabel');
    var wsPortEl = document.getElementById('wsPort');
    var wsReconnectBtn = document.getElementById('wsReconnectBtn');

    function getWsPort() {
        try {
            var m = SERVER_URL.match(/:(\d+)/);
            return m ? parseInt(m[1], 10) : 0;
        } catch (_e) { return 0; }
    }

    (function showPort() {
        var port = getWsPort();
        if (port) wsPortEl.textContent = ':' + port;
    })();

    function setWsStatus(s, detail) {
        wsStatusEl.dataset.state = s;
        wsStatusLabel.textContent = detail || ({ connected: 'Connected', connecting: 'Connecting...', disconnected: 'Disconnected' }[s] || s);
    }

    function applyConnectionInfo(msg) {
        if (!msg || !msg.port) return;
        wsPortEl.textContent = ':' + msg.port;
        var label = 'Connected :' + msg.port;
        if (msg.pid) label += ' pid=' + msg.pid;
        setWsStatus('connected', label);
    }

    function forceReconnect() {
        if (ws) { try { ws.close(); } catch (_e) { /* ignore */ } }
        ws = null; reconnectAttempts = 0;
        setWsStatus('connecting', 'Reconnecting...');
        connect();
    }

    wsStatusEl.addEventListener('click', forceReconnect);
    wsReconnectBtn.addEventListener('click', forceReconnect);

    // ── Command Executor ────────────────────────────────

    function exec(result) {
        if (!result) return;
        var cmds = Array.isArray(result) ? result : result.commands;
        if (!cmds) return;

        for (var i = 0; i < cmds.length; i++) {
            var cmd = cmds[i];
            switch (cmd.type) {
                case 'ws_send':
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify(cmd.message));
                    }
                    break;
                case 'render':
                    for (var j = 0; j < cmd.targets.length; j++) {
                        switch (cmd.targets[j]) {
                            case 'tabs': renderTabs(); break;
                            case 'messages': renderMessages(); break;
                            case 'pending': renderPending(); break;
                            case 'input': updateSendButton(); break;
                            case 'images': renderStagedImages(); break;
                            case 'staged_images': renderStagedImages(); break;
                        }
                    }
                    break;
                case 'dom':
                    switch (cmd.action) {
                        case 'set_input': inputEl.value = cmd.value || ''; break;
                        case 'clear_input': inputEl.value = ''; break;
                        case 'focus_input': inputEl.focus(); break;
                        case 'set_staged_images': renderStagedImages(); break;
                        case 'clear_staged_images': renderStagedImages(); break;
                        case 'update_send_button': updateSendButton(); break;
                        case 'save_state': saveState(); break;
                        case 'sync_settings': syncSettings(); break;
                    }
                    break;
                case 'notify':
                    if (vscode && cmd.message) vscode.postMessage(cmd.message);
                    break;
            }
        }

        if (result.autoSubmit) {
            var as = result.autoSubmit;
            if (as.session_id) exec(state.setActiveSession(as.session_id));
            exec(state.submitFeedback(as.text, as.images || [], {
                preserveInput: true,
                session_id: as.session_id,
            }));
        }
        if (result.autoReply) {
            var ar = result.autoReply;
            setTimeout(function () {
                var sid = ar.session_id || state.activeSessionId;
                var sess = sid && state.sessions[sid];
                if (sess && sess.waiting) {
                    exec(state.submitFeedback(ar.text, [], { preserveInput: true, session_id: sid }));
                }
            }, ar.delay || 500);
        }
    }

    // ── Persistence ─────────────────────────────────────

    var STORAGE_KEY = 'mcp-fb-v4-multi-' + PROJECT_PATH.replace(/[^a-zA-Z0-9]/g, '-').slice(-30);

    function saveState() {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.serialize())); } catch (e) { /* ignore */ }
    }

    function syncSettings() {
        autoReplyCheck.checked = !!state.autoReply;
        autoReplyText.value = state.autoReplyText || 'Continue';
    }

    function loadState() {
        try {
            var d = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
            if (d) state.deserialize(d);
        } catch (e) { /* ignore */ }
    }

    // ── Renderers (pure DOM from state) ─────────────────

    function hideTabContextMenu() {
        tabContextMenu.classList.remove('visible');
        tabContextMenu.innerHTML = '';

    // ── Image Handling ──────────────────────────────────

    function extensionClipboardReady() {
        return ws && ws.readyState === WebSocket.OPEN;
    }

    function extractImagesFromClipboard(clipboardData) {
        return PS.PanelState.extractClipboardImages(clipboardData);
    }

    function addImage(base64) {
        exec(state.stageImage(base64));
        updateSendButton();
    }

    function fileToBase64(file) {
        return new Promise(function (resolve, reject) {
            var reader = new FileReader();
            reader.onload = function () { resolve(reader.result.split(',')[1]); };
            reader.onerror = function () { reject(reader.error || new Error('read failed')); };
            reader.readAsDataURL(file);
        });
    }

    function insertAtCursor(text) {
        if (!text) return;
        var start = inputEl.selectionStart || 0;
        var end = inputEl.selectionEnd || 0;
        var val = inputEl.value || '';
        inputEl.value = val.slice(0, start) + text + val.slice(end);
        var pos = start + text.length;
        inputEl.selectionStart = inputEl.selectionEnd = pos;
        inputEl.dispatchEvent(new Event('input', { bubbles: true }));
    }

    function getCopyPlainFromSelection() {
        var sel = window.getSelection();
        if (!sel || sel.isCollapsed) return '';
        var selected = sel.toString();
        if (!selected) return '';
        var node = sel.anchorNode;
        var el = node && (node.nodeType === 1 ? node : node.parentElement);
        var msgEl = el && el.closest ? el.closest('.message') : null;
        if (!msgEl) return '';
        var contentEl = msgEl.querySelector('.content');
        if (!contentEl) return selected;
        var raw = contentEl.dataset.raw || '';
        return PS.PanelState.selectionCopyText(selected, raw, (contentEl.textContent || '').length);
    }

    function writeClipboardText(text) {
        if (!text) return;
        if (extensionClipboardReady()) {
            window.__mcpPendingCopyText = text;
            ws.send(JSON.stringify({ type: 'clipboard_write', text: text }));
            return;
        }
        if (vscode) {
            vscode.postMessage({ type: 'clipboard-write', text: text });
            showToast('Copied');
            return;
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function () {
                showToast('Copied');
            }).catch(function (err) {
                console.warn('mcp-feedback clipboard write failed:', err && err.message ? err.message : err);
            });
        }
    }

    var pasteRequestId = 0;
    function requestClipboardPaste() {
        if (ws && ws.readyState === WebSocket.OPEN) {
            var rid = 'paste-' + (++pasteRequestId);
            window.__mcpPendingPasteId = rid;
            window.__mcpWsPasteAt = Date.now();
            ws.send(JSON.stringify({ type: 'clipboard_paste', request_id: rid }));
            return;
        }
        if (!vscode) return;
        var rid2 = 'paste-' + (++pasteRequestId);
        window.__mcpPendingPasteId = rid2;
        vscode.postMessage({ type: 'clipboard-paste', requestId: rid2 });
    }

    function showToast(msg) {
        var el = document.getElementById('clipboardToast');
        if (!el) {
            el = document.createElement('div');
            el.id = 'clipboardToast';
            el.className = 'clipboard-toast';
            document.body.appendChild(el);
        }
        el.textContent = msg;
        el.classList.add('visible');
        clearTimeout(window.__mcpToastTimer);
        window.__mcpToastTimer = setTimeout(function () { el.classList.remove('visible'); }, 1200);
    }

    inputEl.addEventListener('mousedown', function () {
        inputEl.focus();
    });

    document.addEventListener('keydown', function (e) {
        if (!(e.metaKey || e.ctrlKey) || e.shiftKey) return;
        if (e.key !== 'c') return;
        if (document.activeElement === inputEl) return;
        var plain = getCopyPlainFromSelection();
        if (plain) {
            e.preventDefault();
            e.stopImmediatePropagation();
            writeClipboardText(plain);
        }
    }, true);

    function blobToBase64(blob) {
        return new Promise(function (resolve, reject) {
            var reader = new FileReader();
            reader.onload = function () { resolve(reader.result.split(',')[1]); };
            reader.onerror = function () { reject(reader.error || new Error('read failed')); };
            reader.readAsDataURL(blob);
        });
    }

    function pasteImageSource(img) {
        var p = img instanceof Blob ? blobToBase64(img) : fileToBase64(img);
        return p.then(addImage).catch(function (err) {
            console.warn('mcp-feedback paste image failed:', err && err.message ? err.message : err);
        });
    }

    async function readImagesFromNavigatorClipboard() {
        if (!navigator.clipboard || !navigator.clipboard.read) return [];
        try {
            var items = await navigator.clipboard.read();
            var blobs = [];
            for (var i = 0; i < items.length; i++) {
                for (var j = 0; j < items[i].types.length; j++) {
                    var type = items[i].types[j];
                    if (type.indexOf('image/') === 0) {
                        blobs.push(await items[i].getType(type));
                    }
                }
            }
            return blobs;
        } catch (err) {
            console.warn('mcp-feedback navigator.clipboard.read failed:', err && err.message ? err.message : err);
            return [];
        }
    }

    async function handleInputPaste(e) {
        if (document.activeElement !== inputEl && e.target !== inputEl) return;
        if (window.__mcpWsPasteAt && Date.now() - window.__mcpWsPasteAt < 500) return;

        var images = extractImagesFromClipboard(e.clipboardData);
        if (!images.length) {
            images = await readImagesFromNavigatorClipboard();
        }
        if (images.length) {
            e.preventDefault();
            e.stopImmediatePropagation();
            for (var pi = 0; pi < images.length; pi++) {
                await pasteImageSource(images[pi]);
            }
            showToast('Pasted');
            return;
        }

        if (extensionClipboardReady()) {
            e.preventDefault();
            requestClipboardPaste();
            return;
        }

        var text = e.clipboardData && e.clipboardData.getData('text/plain');
        if (text) {
            e.preventDefault();
            e.stopImmediatePropagation();
            insertAtCursor(text);
        }
    }

    inputEl.addEventListener('paste', function (e) {
        handleInputPaste(e).catch(function (err) {
            console.warn('mcp-feedback handleInputPaste failed:', err && err.message ? err.message : err);
        });
    }, true);

    var inputArea = inputEl.parentElement.parentElement;
    inputArea.addEventListener('dragover', function (e) { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
    inputArea.addEventListener('drop', async function (e) {
        e.preventDefault();
        for (var i = 0; i < e.dataTransfer.files.length; i++) {
            if (e.dataTransfer.files[i].type.startsWith('image/')) {
                addImage(await fileToBase64(e.dataTransfer.files[i]));
            }
        }
    });

    document.addEventListener('copy', function (e) {
        var plain = getCopyPlainFromSelection();
        if (!plain) return;
        e.preventDefault();
        e.stopImmediatePropagation();

    }, true);

    // ── @ Reference Autocomplete ────────────────────────

    var atSearchTimer = null;
    var atActiveIndex = -1;
    var atItems = [];
    var atVisible = false;

    function getAtQuery() {
        return PS.PanelState.getAtQuery(inputEl.value, inputEl.selectionStart);
    }

    function triggerAtSearch() {
        var result = getAtQuery();
        if (!result || result.query.length === 0) { hideAtDropdown(); return; }
        if (vscode) vscode.postMessage({ type: 'at-search', query: result.query });
    }

    function showAtDropdown(items) {
        atItems = items;
        atActiveIndex = -1;
        if (!items || items.length === 0) { hideAtDropdown(); return; }
        atDropdown.innerHTML = '';
        items.forEach(function (item, i) {
            var row = document.createElement('div');
            row.className = 'at-dropdown-item';
            row.dataset.index = i;
            var icon = document.createElement('span');
            icon.className = 'kind-icon';
            icon.textContent = item.kind === 'file' ? '\uD83D\uDCC4' : '\uD83D\uDD23';
            var label = document.createElement('span');
            label.className = 'at-label';
            label.textContent = item.label;
            var detail = document.createElement('span');
            detail.className = 'at-detail';
            detail.textContent = item.detail;
            row.appendChild(icon);
            row.appendChild(label);
            row.appendChild(detail);
            row.addEventListener('click', function () { selectAtItem(i); });
            atDropdown.appendChild(row);
        });
        atDropdown.classList.add('visible');
        atVisible = true;
    }

    function hideAtDropdown() {
        atDropdown.classList.remove('visible');
        atVisible = false;
        atItems = [];
        atActiveIndex = -1;
    }

    function setAtActive(index) {
        var items = atDropdown.querySelectorAll('.at-dropdown-item');
        items.forEach(function (el) { el.classList.remove('active'); });
        if (index >= 0 && index < items.length) {
            atActiveIndex = index;
            items[index].classList.add('active');
            items[index].scrollIntoView({ block: 'nearest' });
        }
    }

    function selectAtItem(index) {
        var item = atItems[index];
        if (!item) return;
        var result = getAtQuery();
        if (!result) { hideAtDropdown(); return; }
        var before = inputEl.value.substring(0, result.start);
        var after = inputEl.value.substring(inputEl.selectionStart);
        var insert = '@' + item.insertText + ' ';
        inputEl.value = before + insert + after;
        var newPos = before.length + insert.length;
        inputEl.selectionStart = inputEl.selectionEnd = newPos;
        inputEl.focus();
        hideAtDropdown();
        clearTimeout(saveTimer);
        saveTimer = setTimeout(saveState, 500);
    }

    inputEl.addEventListener('input', function () {
        clearTimeout(atSearchTimer);
        var result = getAtQuery();
        if (result && result.query.length > 0) {
            atSearchTimer = setTimeout(triggerAtSearch, 150);
        } else {
            hideAtDropdown();
        }
    });

    inputEl.addEventListener('keydown', function (e) {
        if ((e.metaKey || e.ctrlKey) && !e.shiftKey && e.key === 'v' && extensionClipboardReady()) {
            e.preventDefault();
            requestClipboardPaste();
            return;
        }
        if (atVisible) {
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                setAtActive(atActiveIndex < atItems.length - 1 ? atActiveIndex + 1 : 0);
                return;
            }
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                setAtActive(atActiveIndex > 0 ? atActiveIndex - 1 : atItems.length - 1);
                return;
            }
            if ((e.key === 'Enter' || e.key === 'Tab') && atActiveIndex >= 0) {
                e.preventDefault();
                selectAtItem(atActiveIndex);
                return;
            }
            if (e.key === 'Escape') {
                e.preventDefault();
                hideAtDropdown();
                return;
            }
        }
        if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
            e.preventDefault();
            smartSend();
        }
    });

    // ── WebSocket ────────────────────────────────────────

    function connect() {
        if (ws && ws.readyState === WebSocket.OPEN) return;
        setWsStatus('connecting');
        try {
            ws = new WebSocket(SERVER_URL);
            ws.onopen = function () {
                reconnectAttempts = 0;
                var port = getWsPort();
                setWsStatus('connected', port ? 'Connected :' + port : 'Connected');
                ws.send(JSON.stringify({ type: 'register', clientType: 'webview' }));
            };
            ws.onmessage = function (e) {
                try {
                    var msg = JSON.parse(e.data);
                    if (msg.type === 'connection_established') {
                        applyConnectionInfo(msg);
                        if (msg.version) {
                            var vl = document.getElementById('versionLabel');
                            if (vl) vl.textContent = 'v' + msg.version;
                        }
                    }
                    exec(state.handleMessage(msg));
                    if (msg.type === 'clipboard_write_ok') {
                        window.__mcpPendingCopyText = null;
                        showToast('Copied');
                    } else if (msg.type === 'clipboard_write_err') {
                        var pendingCopy = window.__mcpPendingCopyText || '';
                        window.__mcpPendingCopyText = null;
                        console.warn('mcp-feedback clipboard-write err:', msg.error || 'unknown');
                        if (pendingCopy && navigator.clipboard && navigator.clipboard.writeText) {
                            navigator.clipboard.writeText(pendingCopy).then(function () {
                                showToast('Copied');
                            }).catch(function () {
                                showToast('Copy failed');
                            });
                        } else {
                            showToast('Copy failed');
                        }
                    } else if (msg.type === 'clipboard_paste_result' && msg.request_id === window.__mcpPendingPasteId) {
                        window.__mcpPendingPasteId = null;
                        window.__mcpWsPasteAt = 0;
                        if (msg.image) {
                            addImage(msg.image);
                            showToast('Pasted');
                        } else if (msg.text) {
                            insertAtCursor(msg.text);
                            showToast('Pasted');
                        } else {
                            readImagesFromNavigatorClipboard().then(function (blobs) {
                                if (!blobs.length) {
                                    console.warn('mcp-feedback clipboard-paste: no image or text');
                                    return;
                                }
                                return Promise.all(blobs.map(pasteImageSource)).then(function () {
                                    showToast('Pasted');
                                });
                            }).catch(function (err) {
                                console.warn('mcp-feedback clipboard-paste fallback failed:', err && err.message ? err.message : err);
                            });
                        }
                    }
                } catch (err) { console.error(err); }
            };
            ws.onclose = function () {
                setWsStatus('disconnected');
                scheduleReconnect();
            };
            ws.onerror = function () {
                setWsStatus('disconnected');
            };
        } catch (err) {
            setWsStatus('disconnected');
            scheduleReconnect();
        }
    }

    function scheduleReconnect() {
        var delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
        reconnectAttempts++;
        setWsStatus('connecting', 'Retry #' + reconnectAttempts + ' (' + (delay / 1000).toFixed(0) + 's)');
        setTimeout(connect, delay);
    }

    // ── Extension Messages ──────────────────────────────

    window.addEventListener('message', function (event) {
        var msg = event.data;
        if (msg.type === 'reconnect') {
            if (ws) { try { ws.close(); } catch (e) { /* ignore */ } }
            ws = null; reconnectAttempts = 0;
            setWsStatus('connecting', 'Reconnecting...');
            connect();
        } else if (msg.type === 'focus-input') {
            inputEl.focus();
        } else if (msg.type === 'clipboard-paste-result') {
            if (msg.requestId === window.__mcpPendingPasteId) {
                window.__mcpPendingPasteId = null;
                if (msg.image) addImage(msg.image);
                else if (msg.text) insertAtCursor(msg.text);
            }
        } else if (msg.type === 'at-results') {
            showAtDropdown(msg.items || []);
        }
    });

    // ── Heartbeat ───────────────────────────────────────

    setInterval(function () {
        if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'ping' }));
    }, 30000);

    // ── Init ────────────────────────────────────────────

    loadState();
    if (state.getActiveSession() && state.getActiveSession().inputDraft) {
        inputEl.value = state.getActiveSession().inputDraft;
    }
    renderTabs();
    renderMessages();
    renderPending();
    renderStagedImages();
    updateSendButton();
    syncSettings();
    connect();
})();
</script>
</body>
</html>
