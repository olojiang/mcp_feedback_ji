<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'unsafe-eval' {{CSP_SOURCE}}; style-src 'unsafe-inline' {{CSP_SOURCE}}; connect-src ws://127.0.0.1:* http://127.0.0.1:* {{CSP_SOURCE}}; img-src data: blob: {{CSP_SOURCE}}; font-src data: {{CSP_SOURCE}};">
<title>MCP Feedback Enhanced</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:var(--vscode-editor-background,#0d1117);
  --fg:var(--vscode-foreground,#c9d1d9);
  --fg-dim:var(--vscode-descriptionForeground,#6e7681);
  --border:var(--vscode-input-border,rgba(99,110,123,0.25));
  --input-bg:var(--vscode-input-background,#161b22);
  --btn-bg:#7c3aed;
  --btn-fg:#fff;
  --btn-hover:#6d28d9;
  --accent:#f59e0b;
  --accent-glow:rgba(245,158,11,0.15);
  --waiting-dot:#f59e0b;
  --success:#10b981;
  --danger:#ef4444;
  --ai-bubble:rgba(124,58,237,0.12);
  --user-bubble:rgba(16,185,129,0.12);
  --glow-purple:rgba(124,58,237,0.4);
  --glow-green:rgba(16,185,129,0.4);
  --surface:rgba(255,255,255,0.03);
}
/* Markdown contrast tokens — fixed pairs per detected editor theme (see themeContrast.js) */
:root[data-mcp-theme="dark"]{
  --md-fg:#e6edf3;
  --md-muted:#8b949e;
  --md-strong:#f0f6fc;
  --md-code-bg:#21262d;
  --md-code-fg:#79c0ff;
  --md-code-border:#388bfd66;
  --md-pre-bg:#0d1117;
  --md-pre-fg:#e6edf3;
  --md-pre-border:#388bfd55;
  --md-heading:#f0f6fc;
  --ai-bubble-bg:rgba(124,58,237,0.16);
  --user-bubble-bg:rgba(16,185,129,0.14);
}
:root[data-mcp-theme="light"]{
  --md-fg:#1f2328;
  --md-muted:#59636e;
  --md-strong:#1f2328;
  --md-code-bg:#ddf4ff;
  --md-code-fg:#0550ae;
  --md-code-border:#54aeff66;
  --md-pre-bg:#f6f8fa;
  --md-pre-fg:#1f2328;
  --md-pre-border:#d1d9e0;
  --md-heading:#1f2328;
  --ai-bubble-bg:rgba(124,58,237,0.10);
  --user-bubble-bg:rgba(16,185,129,0.10);
}
:root:not([data-mcp-theme]){
  --md-fg:var(--fg);
  --md-muted:var(--fg-dim);
  --md-strong:var(--fg);
  --md-code-bg:#21262d;
  --md-code-fg:#79c0ff;
  --md-code-border:#388bfd66;
  --md-pre-bg:#0d1117;
  --md-pre-fg:#e6edf3;
  --md-pre-border:#388bfd55;
  --md-heading:var(--fg);
  --ai-bubble-bg:var(--ai-bubble);
  --user-bubble-bg:var(--user-bubble);
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--fg);
  font-family:var(--vscode-font-family,'SF Mono','Cascadia Code','JetBrains Mono',monospace);
  font-size:13px;display:flex;flex-direction:column;height:100vh;
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(124,58,237,0.3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(124,58,237,0.5)}
@keyframes glow-pulse{
  0%,100%{opacity:1;box-shadow:0 0 4px currentColor}
  50%{opacity:.5;box-shadow:0 0 10px currentColor}
}
.status-bar{
  display:flex;align-items:center;gap:8px;padding:3px 12px;
  font-size:10px;color:var(--fg-dim);
  border-bottom:1px solid var(--border);
  background:var(--surface);
}
.messages{
  flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;
  gap:6px;
}
.msg-row{display:flex;animation:msg-in .25s ease-out}
.msg-row.ai{justify-content:flex-start}
.msg-row.user{justify-content:flex-end}
.msg-row.system{justify-content:center}
@keyframes msg-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.message{
  max-width:85%;padding:10px 14px;border-radius:14px;
  line-height:1.55;position:relative;
  transition:transform .15s;
}
.message:hover{transform:scale(1.005)}
.msg-row.ai .message{
  background:var(--ai-bubble-bg);
  border:1px solid rgba(124,58,237,0.15);
  border-top-left-radius:4px;
}
.msg-row.user .message{
  background:var(--user-bubble-bg);
  border:1px solid rgba(16,185,129,0.15);
  border-top-right-radius:4px;
}
.msg-row.system .message{
  background:transparent;
  font-size:11px;color:var(--fg-dim);
  padding:4px 12px;max-width:100%;
  letter-spacing:.3px;
  border:none;border-radius:0;
  font-weight:400;text-align:center;
  opacity:.7;
}
.hint-badge{
  display:inline-block;
  background:rgba(100,116,139,0.15);
  border:1px solid rgba(100,116,139,0.25);
  color:var(--fg-dim);font-size:9px;font-weight:500;
  padding:1px 6px;border-radius:8px;
  letter-spacing:.3px;margin-left:6px;
  vertical-align:middle;text-transform:uppercase;
}
.message .header{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--fg-dim);margin-bottom:5px;user-select:none}
.message .header .role{font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.msg-row.ai .message .header .role{color:#a78bfa}
.msg-row.user .message .header .role{color:#6ee7b7}
.message .content{color:var(--md-fg)}
.message .content p{margin:4px 0;color:var(--md-fg)}
.message .content h2,.message .content h3,.message .content h4{
  margin:10px 0 4px;font-weight:700;line-height:1.35;color:var(--md-heading);
}
.message .content h2{font-size:15px}
.message .content h3{font-size:14px}
.message .content h4{font-size:13px;color:var(--md-muted)}
.message .content ul{margin:4px 0;padding-left:1.25em;list-style:disc;color:var(--md-fg)}
.message .content li{margin:2px 0;line-height:1.45;color:var(--md-fg)}
.message .content :not(pre)>code{
  background:var(--md-code-bg);color:var(--md-code-fg);
  border:1px solid var(--md-code-border);
  padding:2px 6px;border-radius:4px;font-size:12px;font-weight:500;
  font-family:var(--vscode-editor-font-family,'SF Mono','Cascadia Code',monospace);
  box-decoration-break:clone;-webkit-box-decoration-break:clone;
}
.message .content strong{color:var(--md-strong);font-weight:700}
.message .content em{color:var(--md-muted);font-style:italic}
.message .content pre{
  background:var(--md-pre-bg);padding:10px;border-radius:8px;
  overflow-x:auto;margin:6px 0;border:1px solid var(--md-pre-border);
}
.message .content pre code{
  background:transparent;padding:0;border:none;border-radius:0;
  display:block;white-space:pre-wrap;color:var(--md-pre-fg);font-size:12px;line-height:1.5;
}
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--fg-dim);text-align:center;padding:32px;gap:12px;
}
.empty-state .icon{
  font-size:42px;animation:float 3s ease-in-out infinite;
  filter:drop-shadow(0 0 12px rgba(124,58,237,0.3));
}
.empty-state .title{font-size:14px;font-weight:700;letter-spacing:1.5px;color:var(--fg)}
.empty-state .sub{font-size:11px;opacity:.5;max-width:240px;line-height:1.5}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.pending-section{
  margin:0 12px 8px;padding:10px 12px;
  background:var(--accent-glow);
  border:1px solid rgba(245,158,11,0.25);
  border-radius:10px;display:none;
  backdrop-filter:blur(4px);
}
.pending-section.visible{display:block;animation:msg-in .2s ease-out}
.pending-header{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--accent);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;font-weight:600}
.pending-header button{
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171;
  border-radius:6px;padding:3px 8px;cursor:pointer;font-size:12px;transition:all .15s;
}
.pending-header button:hover{background:rgba(239,68,68,0.2);color:#fca5a5}
.pending-item{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px}
.pending-item .text{flex:1;word-break:break-word}
.pending-item button{
  background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.3);color:var(--accent);
  border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;opacity:.8;
  transition:all .15s;min-width:28px;text-align:center;
}
.pending-item button:hover{opacity:1;background:rgba(245,158,11,0.15);transform:scale(1.05)}
.quick-replies{display:flex;gap:6px;padding:6px 12px;flex-wrap:wrap;align-items:center}
.quick-reply-btn{
  background:linear-gradient(135deg,rgba(124,58,237,0.06),rgba(16,185,129,0.06));
  border:1px solid rgba(124,58,237,0.2);color:var(--fg-dim);
  border-radius:20px;padding:5px 14px;cursor:pointer;font-size:11px;
  transition:all .25s cubic-bezier(.4,0,.2,1);letter-spacing:.3px;
  position:relative;overflow:hidden;
}
.quick-reply-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(16,185,129,0.1));
  opacity:0;transition:opacity .25s;
}
.quick-reply-btn:hover{
  border-color:var(--btn-bg);color:var(--fg);
  transform:translateY(-1px);
  box-shadow:0 2px 10px rgba(124,58,237,0.2);
}
.quick-reply-btn:hover::before{opacity:1}
.quick-reply-btn:active{transform:translateY(0);box-shadow:none}
.finished-reply-btn{
  border-color:rgba(16,185,129,0.55)!important;
  color:#6ee7b7!important;
  font-weight:700;
  order:99;
  margin-left:auto;
}
.finished-reply-btn:hover{
  border-color:#10b981!important;
  color:#ecfdf5!important;
  box-shadow:0 2px 12px rgba(16,185,129,0.35)!important;
}
.input-area{padding:8px 12px 10px;border-top:1px solid var(--border);background:var(--surface)}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{
  flex:1;min-height:76px;max-height:200px;resize:vertical;
  background:var(--input-bg);color:var(--fg);
  border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;font-family:inherit;font-size:13px;line-height:1.4;
  transition:border-color .2s,box-shadow .2s;
}
.input-row textarea:focus{outline:none;border-color:var(--btn-bg);box-shadow:0 0 0 2px rgba(124,58,237,0.15)}
.input-row textarea::placeholder{color:var(--fg-dim)}
.send-btn{
  background:linear-gradient(135deg,#7c3aed,#6d28d9);color:var(--btn-fg);
  border:none;border-radius:10px;padding:10px 18px;cursor:pointer;
  font-size:12px;font-weight:600;white-space:nowrap;
  letter-spacing:.5px;text-transform:uppercase;
  transition:all .2s;box-shadow:0 2px 8px rgba(124,58,237,0.3);
}
.send-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(124,58,237,0.4)}
.send-btn:active{transform:translateY(0)}
.send-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.send-btn.queue-mode{
  background:linear-gradient(135deg,rgba(245,158,11,0.1),rgba(251,191,36,0.05));
  color:var(--accent);
  border:1px solid rgba(245,158,11,0.3);box-shadow:none;
}
.send-btn.queue-mode:hover{
  border-color:var(--accent);color:#fbbf24;
  box-shadow:0 2px 10px rgba(245,158,11,0.2);transform:translateY(-1px);
}
.image-previews{display:flex;gap:8px;padding:6px 12px;flex-wrap:wrap}
.image-previews:empty{display:none}
.img-preview{
  position:relative;width:56px;height:56px;border-radius:8px;overflow:hidden;
  border:1px solid var(--border);transition:transform .15s;
}
.img-preview:hover{transform:scale(1.05)}
.img-preview img{width:100%;height:100%;object-fit:cover}
.img-preview .remove{
  position:absolute;top:-2px;right:-2px;width:18px;height:18px;
  background:rgba(239,68,68,0.9);color:#fff;border:none;border-radius:50%;
  font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  line-height:1;opacity:0;transition:opacity .15s;
}
.img-preview:hover .remove{opacity:1}
.input-actions{display:flex;flex-direction:column;gap:6px;align-items:stretch}
.attach-btn{
  background:transparent;border:1px solid var(--border);color:var(--fg-dim);
  border-radius:10px;padding:8px 10px;cursor:pointer;font-size:15px;line-height:1;
  transition:all .2s;display:flex;align-items:center;justify-content:center;
}
.attach-btn:hover{color:var(--fg);border-color:var(--btn-bg);box-shadow:0 0 8px rgba(124,58,237,0.15)}
.message .content img{max-width:200px;max-height:150px;border-radius:8px;margin:6px 0;cursor:zoom-in;display:block;transition:opacity .15s}
.message .content img:hover{opacity:.85}
.lightbox{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.9);backdrop-filter:blur(8px);
  z-index:999;align-items:center;justify-content:center;cursor:zoom-out;
}
.lightbox.visible{display:flex}
.lightbox img{max-width:95vw;max-height:95vh;border-radius:10px;box-shadow:0 0 60px rgba(0,0,0,.7)}
.settings-toggle{margin-left:auto;flex-shrink:0}
.settings-toggle button{
  background:var(--surface);border:1px solid var(--border);color:var(--fg-dim);
  cursor:pointer;font-size:14px;padding:3px 8px;
  transition:all .2s;border-radius:6px;
}
.settings-toggle button:hover{
  color:var(--fg);border-color:rgba(124,58,237,0.4);
  background:rgba(124,58,237,0.08);
  box-shadow:0 0 8px rgba(124,58,237,0.15);
}
.settings-panel{
  display:none;
  margin:6px 10px;padding:0;
  border:1px solid rgba(124,58,237,0.3);
  border-radius:12px;overflow:hidden;
  background:var(--input-bg);
  box-shadow:0 4px 20px rgba(0,0,0,0.3),0 0 1px rgba(124,58,237,0.3);
}
.settings-panel.visible{display:block;animation:settings-in .25s ease-out}
@keyframes settings-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.settings-panel-title{
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:#a78bfa;padding:10px 14px 8px;
  background:linear-gradient(135deg,rgba(124,58,237,0.12),rgba(124,58,237,0.04));
  border-bottom:1px solid rgba(124,58,237,0.15);
}
.settings-panel-body{padding:10px 14px 12px}
.settings-panel label{
  display:flex;align-items:center;gap:10px;font-size:12px;margin-bottom:6px;
  cursor:pointer;padding:7px 10px;border-radius:8px;
  border:1px solid transparent;transition:all .15s;
}
.settings-panel label:hover{background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.12)}
.settings-panel input[type="checkbox"]{
  accent-color:#7c3aed;width:15px;height:15px;cursor:pointer;
}
.settings-panel input[type="text"]{
  width:100%;background:rgba(0,0,0,0.2);color:var(--fg);
  border:1px solid var(--border);border-radius:8px;padding:6px 12px;
  font-size:12px;margin-top:4px;transition:all .2s;
}
.settings-panel input[type="text"]:focus{border-color:var(--btn-bg);outline:none;box-shadow:0 0 0 2px rgba(124,58,237,0.12)}
.debug-toggle{flex-shrink:0}
.debug-toggle button{
  background:var(--surface);border:1px solid var(--border);color:var(--fg-dim);
  cursor:pointer;font-size:10px;font-weight:700;padding:3px 7px;letter-spacing:.5px;
  transition:all .2s;border-radius:6px;
}
.debug-toggle button:hover,.debug-toggle button.active{
  color:#fbbf24;border-color:rgba(251,191,36,0.5);
  background:rgba(251,191,36,0.1);
  box-shadow:0 0 8px rgba(251,191,36,0.15);
}
.debug-panel{
  display:none;margin:6px 10px;padding:0;
  border:1px solid rgba(251,191,36,0.35);border-radius:12px;overflow:hidden;
  background:var(--input-bg);
  box-shadow:0 4px 20px rgba(0,0,0,0.3),0 0 1px rgba(251,191,36,0.3);
  max-height:72vh;
}
.debug-panel.visible{display:flex;flex-direction:column;animation:settings-in .25s ease-out}
.debug-panel-title{
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:#fbbf24;padding:8px 12px;
  background:linear-gradient(135deg,rgba(251,191,36,0.12),rgba(251,191,36,0.04));
  border-bottom:1px solid rgba(251,191,36,0.15);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.debug-panel-actions{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.debug-panel-actions button{
  background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.25);
  color:#fbbf24;font-size:9px;font-weight:600;padding:3px 8px;border-radius:6px;
  cursor:pointer;letter-spacing:.3px;text-transform:uppercase;
}
.debug-panel-actions button:hover{background:rgba(251,191,36,0.2)}
.debug-panel-body{
  padding:8px 10px;overflow:auto;flex:1;
  font-size:10px;line-height:1.45;color:var(--fg-dim);
}
.debug-panel pre{
  margin:0;white-space:pre-wrap;word-break:break-word;
  font-family:inherit;font-size:10px;color:var(--fg);
  user-select:text;-webkit-user-select:text;
}
.debug-hint{font-size:9px;opacity:.65;margin-bottom:6px;line-height:1.4}
.at-dropdown{
  display:none;position:absolute;bottom:100%;left:0;right:0;
  max-height:240px;overflow-y:auto;z-index:100;
  background:var(--input-bg);border:1px solid var(--border);
  border-radius:10px 10px 0 0;margin-bottom:-1px;
  box-shadow:0 -4px 20px rgba(0,0,0,0.3),0 0 1px rgba(124,58,237,0.3);
  backdrop-filter:blur(12px);
}
.at-dropdown.visible{display:block;animation:at-in .15s ease-out}
@keyframes at-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.at-dropdown-item{
  display:flex;align-items:center;gap:8px;padding:7px 12px;
  cursor:pointer;font-size:12px;transition:background .1s;
}
.at-dropdown-item:hover,.at-dropdown-item.active{
  background:rgba(124,58,237,0.12);
}
.at-dropdown-item .kind-icon{
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;opacity:.7;
  background:rgba(124,58,237,0.08);border-radius:5px;
}
.at-dropdown-item .at-label{color:var(--fg);font-weight:500}
.at-dropdown-item .at-detail{color:var(--fg-dim);font-size:10px;margin-left:auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:50%}
.ws-info{display:flex;align-items:center;gap:6px}
.ws-status{
  display:flex;align-items:center;gap:5px;cursor:pointer;
  padding:1px 7px;border-radius:10px;
  transition:background .2s;user-select:none;
}
.ws-status:hover{background:rgba(255,255,255,0.06)}
.ws-status-dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
  transition:background .3s,box-shadow .3s;
}
.ws-status-label{font-size:10px;letter-spacing:.3px;transition:color .3s}
.ws-status[data-state="connected"] .ws-status-dot{background:var(--success);box-shadow:0 0 6px var(--glow-green)}
.ws-status[data-state="connected"] .ws-status-label{color:var(--success)}
.ws-status[data-state="degraded"] .ws-status-dot{background:#f59e0b;box-shadow:0 0 6px rgba(245,158,11,0.5)}
.ws-status[data-state="degraded"] .ws-status-label{color:#f59e0b}
.connection-detail{font-size:10px;opacity:.75;max-width:420px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:6px}
.connection-detail[data-level="degraded"]{color:#f59e0b}
.connection-detail[data-level="disconnected"]{color:var(--danger)}
.ws-status[data-state="connecting"] .ws-status-dot{background:var(--accent);animation:glow-pulse 1.5s ease-in-out infinite}
.ws-status[data-state="connecting"] .ws-status-label{color:var(--accent)}
.ws-status[data-state="disconnected"] .ws-status-dot{background:var(--danger);box-shadow:0 0 4px rgba(239,68,68,0.4)}
.ws-status[data-state="disconnected"] .ws-status-label{color:var(--danger)}
.ws-port{font-size:9px;opacity:.4;font-family:monospace}
.ws-reconnect-btn{
  background:transparent;border:1px solid var(--border);color:var(--fg-dim);
  cursor:pointer;font-size:12px;padding:1px 6px;border-radius:6px;
  transition:all .2s;line-height:1;
}

<body>

  <div class="ws-info">

      <span class="ws-status-dot"></span>
      <span class="ws-status-label" id="wsStatusLabel">Disconnected</span>

    <span class="ws-port" id="wsPort"></span>
    <span class="connection-detail" id="connectionDetail" data-level="disconnected" title=""></span>

  </div>
  <div style="flex:1"></div>
  <div class="debug-toggle"><button id="debugBtn" title="Debug / Inspect connection state">DBG</button></div>

<!-- eruda + helpers loaded as external webview resources (early bootstrap) -->
<script>
window.__mcpScriptLoad = { eruda: false, erudaPanel: false, panelState: false, errors: [] };
function __mcpScriptOk(name) { window.__mcpScriptLoad[name] = true; }
function __mcpScriptFail(name) {
    window.__mcpScriptLoad.errors.push(name);
    console.error('[mcp-panel] failed to load script: ' + name);
}
</script>
<script src="{{ERUDA_URI}}" onload="__mcpScriptOk('eruda')" onerror="__mcpScriptFail('eruda')"></script>
<script src="{{ERUDA_PANEL_URI}}" onload="__mcpScriptOk('erudaPanel')" onerror="__mcpScriptFail('erudaPanel')"></script>
<script src="{{PANELSTATE_URI}}" onload="__mcpScriptOk('panelState')" onerror="__mcpScriptFail('panelState')"></script>

<script>
const SERVER_URL = '{{SERVER_URL}}';
const PROJECT_PATH = '{{PROJECT_PATH}}';

window.__mcpPanelError = null;
window.onerror = function (msg, src, line, col, err) {
    window.__mcpPanelError = { msg: msg, src: src, line: line, col: col };
    var el = document.getElementById('statusBar');
    if (el) {
        var errSpan = document.createElement('span');
        errSpan.style.cssText = 'color:#ef4444;font-size:9px;cursor:pointer;margin-left:6px';
        errSpan.textContent = 'JS ERR L' + line;
        errSpan.title = msg;
        errSpan.onclick = function () {
            var d = document.getElementById('debugJson');
            if (d) {
                d.textContent = JSON.stringify(window.__mcpPanelError, null, 2);
                var dp = document.getElementById('debugPanel');
                if (dp) dp.classList.add('visible');
            }
            alert('Panel JS error at line ' + line + ':\n' + msg);
        };
        el.appendChild(errSpan);
    }
};

(function () {
    'use strict';

    var PS = window.PanelStateModule || (typeof PanelState !== 'undefined' ? { PanelState: PanelState } : null);
    var EP = window.ErudaPanelModule || null;
    if (!PS) { console.error('PanelState not loaded'); return; }
    if (!EP) { console.error('ErudaPanelModule not loaded'); return; }

    var state = new PS.PanelState();
    state.panelWorkspace = PROJECT_PATH;
    var vscode = typeof acquireVsCodeApi === 'function' ? acquireVsCodeApi() : null;
    var wsUrl = SERVER_URL;
    var useBridge = !!vscode;
    var bridgeGate = new PS.BridgeSessionGate();
    var outboundQueue = new PS.OutboundQueue();

    function transportReady() {
        if (useBridge) return bridgeGate.isReady();
        return ws && ws.readyState === WebSocket.OPEN;
    }

    function transportSend(obj) {
        if (useBridge) {
            if (!bridgeGate.isReady()) return false;
            vscode.postMessage({ type: 'hub-message', data: obj });
            return true;
        }
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify(obj));
            return true;
        }
        return false;
    }

    function flushOutboundQueue() {
        if (!transportReady()) return;
        var items = outboundQueue.drain();
        if (!items.length) return;
        debugLog('flushOutboundQueue n=' + items.length);
        for (var i = 0; i < items.length; i++) {
            transportSend(items[i]);
        }
    }

    function queueOutbound(message) {
        var size = outboundQueue.enqueue(message);
        debugLog('queueOutbound type=' + (message && message.type) + ' size=' + size);
        if (message && message.type === 'feedback_response') {
            showToast('Reconnecting — feedback queued');
        }
    }

    function execWsSend(message) {
        return PS.transportSendWithQueue(
            message,
            transportReady,
            function (m) { transportSend(m); },
            queueOutbound
        );
    }

    var messagesEl = document.getElementById('messages');
    var sessionTabsEl = document.getElementById('sessionTabs');
    var tabContextMenu = document.getElementById('tabContextMenu');
    var closeResolvedBtn = document.getElementById('closeResolvedBtn');
    var emptyState = document.getElementById('emptyState');
    var pendingSection = document.getElementById('pendingSection');
    var pendingCountEl = document.getElementById('pendingCount');
    var pendingList = document.getElementById('pendingList');
    var clearPendingBtn = document.getElementById('clearPendingBtn');
    var quickReplies = document.getElementById('quickReplies');
    var inputEl = document.getElementById('input');
    var sendBtn = document.getElementById('sendBtn');
    var settingsBtn = document.getElementById('settingsBtn');
    var settingsPanel = document.getElementById('settingsPanel');
    var debugBtn = document.getElementById('debugBtn');
    var debugPanel = document.getElementById('debugPanel');
    var debugJsonEl = document.getElementById('debugJson');
    var debugDevToolsBtn = document.getElementById('debugDevToolsBtn');
    var debugReconnectBtn = document.getElementById('debugReconnectBtn');
    var debugCopyBtn = document.getElementById('debugCopyBtn');
    var debugCloseBtn = document.getElementById('debugCloseBtn');
    var autoReplyCheck = document.getElementById('autoReplyCheck');
    var autoReplyText = document.getElementById('autoReplyText');
    var atDropdown = document.getElementById('atDropdown');
    var lightbox = document.getElementById('lightbox');
    var lightboxImg = document.getElementById('lightboxImg');
    var imagePreviews = document.getElementById('imagePreviews');
    var attachBtn = document.getElementById('attachBtn');
    var fileInput = document.getElementById('fileInput');

    var ws = null;
    var reconnectAttempts = 0;
    var lastForceReconnectAt = 0;

    var wsStatusEl = document.getElementById('wsStatus');
    var wsStatusLabel = document.getElementById('wsStatusLabel');
    var wsPortEl = document.getElementById('wsPort');
    var connectionDetailEl = document.getElementById('connectionDetail');
    var wsReconnectBtn = document.getElementById('wsReconnectBtn');

    var debugEvents = [];
    var lastExtensionDebugReport = null;
    var userPingPending = false;
    var userPingTimer = null;
    var lastPongAt = 0;
    var connectedHubPid = null;
    var PING_STALE_MS = 45000;
    var erudaInited = false;
    var erudaDisplayPct = Math.round(
        (EP.loadHeight(localStorage, window.innerHeight || 600) / (window.innerHeight || 600)) * 100
    );

    function logEruda(msg) {
        console.log('[mcp-eruda] ' + msg);
        debugLog('eruda: ' + msg);
    }

    function ensureErudaInited() {
        if (erudaInited) return true;
        if (typeof eruda === 'undefined') {
            console.warn('[mcp-eruda] script not loaded');
            return false;
        }
        try {
            eruda.init({
                tool: ['console', 'elements', 'network', 'resources', 'info'],
                defaults: {
                    displaySize: erudaDisplayPct,
                    transparency: 1,
                },
            });
            erudaInited = true;
            return true;
        } catch (err) {
            console.error('[mcp-eruda] init failed', err);
            debugLog('eruda init failed: ' + (err && err.message ? err.message : String(err)));
            return false;
        }
    }

    function bootstrapErudaPanel() {
        var load = window.__mcpScriptLoad || {};
        if (load.errors && load.errors.length) {
            logEruda('script load errors: ' + load.errors.join(', '));
        }
        if (ensureErudaInited()) {
            logEruda('init at page load ok displaySize=' + erudaDisplayPct + '%');
        } else {
            logEruda('init at page load skipped (eruda=' + (typeof eruda) + ')');
        }
    }

    function debugLog(msg) {
        debugEvents.push({ t: new Date().toISOString(), msg: msg });
        if (debugEvents.length > 50) debugEvents.shift();
        if (vscode) {
            vscode.postMessage({ type: 'log', msg: msg });
        }
    }

    function collectLocalDebugState() {
        return {
            webview: {
                useBridge: useBridge,
                bridgeGate: bridgeGate.snapshot(),
                wsUrl: wsUrl,
                wsReadyState: ws ? ws.readyState : null,
                bootstrapped: !!window.__mcpBootstrapped,
                reconnectAttempts: reconnectAttempts,
                vscodeApi: !!vscode,
                transportReady: transportReady(),
                outboundQueued: outboundQueue.size,
                erudaInited: erudaInited,
            },
            events: debugEvents.slice(-30),
            userAgent: navigator.userAgent,
            timestamp: new Date().toISOString(),
        };
    }

    function renderDebugPanel() {
        if (!debugJsonEl) return;
        var payload = {
            local: collectLocalDebugState(),
            extension: lastExtensionDebugReport || { note: 'waiting for extension debug-report...' },
        };
        debugJsonEl.textContent = JSON.stringify(payload, null, 2);
    }

    function openDebugPanel() {
        if (!debugPanel) return;
        debugPanel.classList.add('visible');
        settingsPanel.classList.remove('visible');
        if (debugBtn) debugBtn.classList.add('active');
        renderDebugPanel();
        if (vscode) vscode.postMessage({ type: 'request-debug' });
    }

    function closeDebugPanel() {
        if (!debugPanel) return;
        debugPanel.classList.remove('visible');
        if (debugBtn) debugBtn.classList.remove('active');
    }

    function getFullDebugJson() {
        return JSON.stringify({
            local: collectLocalDebugState(),
            extension: lastExtensionDebugReport,
        }, null, 2);
    }

    function getWsPort() {
        try {
            var m = wsUrl.match(/:(\d+)/);
            return m ? parseInt(m[1], 10) : 0;
        } catch (_e) { return 0; }
    }

    (function showPort() {
        var port = getWsPort();
        if (port) wsPortEl.textContent = ':' + port;
    })();

    function setWsStatus(s, detail) {
        wsStatusEl.dataset.state = s;
        var defaults = {
            connected: 'Connected',
            degraded: 'Degraded',
            connecting: 'Connecting...',
            disconnected: 'Disconnected — click ↻ or Reload Window',
        };
        wsStatusLabel.textContent = detail || defaults[s] || s;
    }

    function applyHubSnapshot(hub) {
        if (!hub || typeof hub !== 'object') return;
        state.hubSnapshot = hub;
        if (hub.pid) connectedHubPid = hub.pid;
    }

    function renderConnectionHealth() {
        if (!connectionDetailEl || !PS.ConnectionHealth) return;
        var pendingList = (state.lastPendingSessionIds || []).map(function (id) {
            return { id: id };
        });
        var stale = PS.ConnectionHealth.countStaleLocalWaiting(
            state.sessions,
            state.sessionOrder,
            pendingList,
        );
        var pingStale = bridgeGate.isReady()
            && lastPongAt > 0
            && (Date.now() - lastPongAt > PING_STALE_MS);
        var hubPidMismatch = !!(state.hubSnapshot && connectedHubPid
            && state.hubSnapshot.pid && connectedHubPid !== state.hubSnapshot.pid);
        var health = PS.ConnectionHealth.evaluate({
            bridgeReady: bridgeGate.isReady(),
            hub: state.hubSnapshot,
            staleLocalWaiting: stale,
            localWaitingCount: state.waitingCount,
            pingStale: pingStale,
            hubPidMismatch: hubPidMismatch,
            port: getWsPort(),
            routingMismatchProject: state.routingMismatch && state.routingMismatch.project,
        });
        setWsStatus(health.level, health.label + (health.portPid || ''));
        connectionDetailEl.textContent = health.detail;
        connectionDetailEl.dataset.level = health.level;
        connectionDetailEl.title = health.issues.length
            ? health.issues.join('\n')
            : health.detail;
    }

    function applyConnectionInfo(msg) {
        if (!msg || !msg.port) return;
        var nextUrl = PS.PanelState.resolveWsUrl(wsUrl, msg.port);
        if (nextUrl !== wsUrl) {
            console.warn('mcp-feedback ws port drift:', getWsPort(), '->', msg.port);
            wsUrl = nextUrl;
            forceReconnect();
            return;
        }
        wsPortEl.textContent = ':' + msg.port;
        var label = 'Connected :' + msg.port;
        if (msg.pid) label += ' pid=' + msg.pid;
        setWsStatus('connected', label);
    }

    function forceReconnect() {
        var now = Date.now();
        if (PS.PanelState.shouldDebounceReconnect(lastForceReconnectAt, now)) {
            debugLog('forceReconnect debounced');
            return;
        }
        lastForceReconnectAt = now;
        debugLog('forceReconnect');
        bridgeGate.resetForReconnect();
        if (useBridge) {
            setWsStatus('connecting', 'Reconnecting...');
            vscode.postMessage({ type: 'hub-connect' });
            return;
        }
        if (ws) { try { ws.close(); } catch (_e) { /* ignore */ } }
        ws = null; reconnectAttempts = 0;
        setWsStatus('connecting', 'Reconnecting...');
        connect();
    }

    wsStatusEl.addEventListener('click', forceReconnect);
    wsReconnectBtn.addEventListener('click', forceReconnect);

    // ── Command Executor ────────────────────────────────

    function exec(result) {
        if (!result) return;
        var cmds = Array.isArray(result) ? result : result.commands;
        if (!cmds) return;

        for (var i = 0; i < cmds.length; i++) {
            var cmd = cmds[i];
            switch (cmd.type) {
                case 'ws_send':
                    execWsSend(cmd.message);
                    break;
                case 'render':
                    for (var j = 0; j < cmd.targets.length; j++) {
                        switch (cmd.targets[j]) {
                            case 'tabs': renderTabs(); break;
                            case 'messages': renderMessages(); break;
                            case 'pending': renderPending(); break;
                            case 'input': updateSendButton(); break;
                            case 'images': renderStagedImages(); break;
                            case 'staged_images': renderStagedImages(); break;
                        }
                    }
                    break;
                case 'dom':
                    switch (cmd.action) {
                        case 'set_input': inputEl.value = cmd.value || ''; break;
                        case 'clear_input': inputEl.value = ''; break;
                        case 'focus_input': inputEl.focus(); break;
                        case 'set_staged_images': renderStagedImages(); break;
                        case 'clear_staged_images': renderStagedImages(); break;
                        case 'update_send_button': updateSendButton(); break;
                        case 'save_state': saveState(); break;
                        case 'sync_settings': syncSettings(); break;
                        case 'user_ping': beginUserPing(); break;
                    }
                    break;
                case 'notify':
                    if (vscode && cmd.message) vscode.postMessage(cmd.message);
                    break;
            }
        }

        if (result.autoSubmit) {
            var as = result.autoSubmit;
            if (as.session_id) exec(state.setActiveSession(as.session_id));
            exec(state.submitFeedback(as.text, as.images || [], {
                preserveInput: true,
                session_id: as.session_id,
            }));
        }
        if (result.autoReply) {
            var ar = result.autoReply;
            setTimeout(function () {
                var sid = ar.session_id || state.activeSessionId;
                var sess = sid && state.sessions[sid];
                if (sess && sess.waiting) {
                    exec(state.submitFeedback(ar.text, [], { preserveInput: true, session_id: sid }));
                }
            }, ar.delay || 500);
        }
    }

    // ── Persistence ─────────────────────────────────────

    var STORAGE_KEY = 'mcp-fb-v4-multi-' + PROJECT_PATH.replace(/[^a-zA-Z0-9]/g, '-').slice(-30);

    function saveState() {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.serialize())); } catch (e) { /* ignore */ }
    }

    function syncSettings() {
        autoReplyCheck.checked = !!state.autoReply;
        autoReplyText.value = state.autoReplyText || 'Continue';
    }

    function loadState() {
        try {
            var d = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
            if (d) state.deserialize(d);
        } catch (e) { /* ignore */ }
    }

    // ── Renderers (pure DOM from state) ─────────────────

    function hideTabContextMenu() {
        tabContextMenu.classList.remove('visible');
        tabContextMenu.innerHTML = '';
    }

    function showTabContextMenu(e, sid) {
        hideTabContextMenu();
        var items = [
            { label: 'Close', run: function () { exec(state.closeSession(sid)); } },
            { label: 'Close Others', run: function () { exec(state.closeOtherSessions(sid)); } },
            { label: 'Close to the Left', run: function () { exec(state.closeSessionsToLeft(sid)); } },
            { label: 'Close All Resolved', run: function () { exec(state.closeResolvedSessions()); } },
        ];
        for (var i = 0; i < items.length; i++) {
            (function (item) {
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = item.label;
                btn.onclick = function () { hideTabContextMenu(); item.run(); };
                tabContextMenu.appendChild(btn);
            })(items[i]);
        }
        tabContextMenu.style.left = e.clientX + 'px';
        tabContextMenu.style.top = e.clientY + 'px';
        tabContextMenu.classList.add('visible');
    }

    if (closeResolvedBtn) {
        closeResolvedBtn.addEventListener('click', function () {
            exec(state.closeResolvedSessions());
        });
    }

    function renderTabs() {
        sessionTabsEl.innerHTML = '';
        if (!state.sessionOrder.length) return;

    function fileToBase64(file) {
        return new Promise(function (resolve, reject) {
            var reader = new FileReader();
            reader.onload = function () { resolve(reader.result.split(',')[1]); };
            reader.onerror = function () { reject(reader.error || new Error('read failed')); };
            reader.readAsDataURL(file);
        });
    }

    function insertAtCursor(text) {
        if (!text) return;
        var start = inputEl.selectionStart || 0;
        var end = inputEl.selectionEnd || 0;
        var val = inputEl.value || '';
        inputEl.value = val.slice(0, start) + text + val.slice(end);
        var pos = start + text.length;
        inputEl.selectionStart = inputEl.selectionEnd = pos;
        inputEl.dispatchEvent(new Event('input', { bubbles: true }));
    }

    function getCopyPlainFromSelection() {
        var sel = window.getSelection();
        if (!sel || sel.isCollapsed) return '';
        var selected = sel.toString();
        if (!selected) return '';
        var node = sel.anchorNode;
        var el = node && (node.nodeType === 1 ? node : node.parentElement);
        var msgEl = el && el.closest ? el.closest('.message') : null;
        if (!msgEl) return '';
        var contentEl = msgEl.querySelector('.content');
        if (!contentEl) return selected;
        var raw = contentEl.dataset.raw || '';
        return PS.PanelState.selectionCopyText(selected, raw, (contentEl.textContent || '').length);
    }

    function writeClipboardText(text) {
        if (!text) return;
        if (extensionClipboardReady()) {
            window.__mcpPendingCopyText = text;
            transportSend({ type: 'clipboard_write', text: text });
            return;
        }
        if (vscode) {
            vscode.postMessage({ type: 'clipboard-write', text: text });
            showToast('Copied');
            return;
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function () {
                showToast('Copied');
            }).catch(function (err) {
                console.warn('mcp-feedback clipboard write failed:', err && err.message ? err.message : err);
            });
        }
    }

    var pasteRequestId = 0;
    function requestClipboardPaste() {
        if (transportReady()) {
            var rid = 'paste-' + (++pasteRequestId);
            window.__mcpPendingPasteId = rid;
            window.__mcpWsPastePending = true;
            window.__mcpWsPasteAt = Date.now();
            transportSend({ type: 'clipboard_paste', request_id: rid });
            return;
        }
        if (!vscode) return;
        var rid2 = 'paste-' + (++pasteRequestId);
        window.__mcpPendingPasteId = rid2;
        vscode.postMessage({ type: 'clipboard-paste', requestId: rid2 });

    function blobToBase64(blob) {
        return new Promise(function (resolve, reject) {
            var reader = new FileReader();
            reader.onload = function () { resolve(reader.result.split(',')[1]); };
            reader.onerror = function () { reject(reader.error || new Error('read failed')); };
            reader.readAsDataURL(blob);
        });
    }

    function pasteImageSource(img) {
        var p = img instanceof Blob ? blobToBase64(img) : fileToBase64(img);
        return p.then(addImage).catch(function (err) {
            console.warn('mcp-feedback paste image failed:', err && err.message ? err.message : err);
        });
    }

    async function readImagesFromNavigatorClipboard() {
        if (!navigator.clipboard || !navigator.clipboard.read) return [];
        try {
            var items = await navigator.clipboard.read();
            var blobs = [];
            for (var i = 0; i < items.length; i++) {
                for (var j = 0; j < items[i].types.length; j++) {
                    var type = items[i].types[j];
                    if (type.indexOf('image/') === 0) {
                        blobs.push(await items[i].getType(type));
                    }
                }
            }
            return blobs;
        } catch (err) {
            console.warn('mcp-feedback navigator.clipboard.read failed:', err && err.message ? err.message : err);
            return [];
        }
    }

    async function handleInputPaste(e) {
        if (document.activeElement !== inputEl && e.target !== inputEl) return;
        if (PS.PanelState.shouldBlockDuplicatePaste(window.__mcpWsPastePending, window.__mcpWsPasteAt, Date.now())) {
            e.preventDefault();
            e.stopImmediatePropagation();
            return;
        }

        var images = extractImagesFromClipboard(e.clipboardData);
        if (!images.length) {
            images = await readImagesFromNavigatorClipboard();
        }
        if (images.length) {
            e.preventDefault();
            e.stopImmediatePropagation();
            for (var pi = 0; pi < images.length; pi++) {
                await pasteImageSource(images[pi]);
            }
            showToast('Pasted');
            return;
        }

        if (extensionClipboardReady()) {
            e.preventDefault();
            e.stopImmediatePropagation();
            return;
        }

        var text = e.clipboardData && e.clipboardData.getData('text/plain');
        if (text) {
            e.preventDefault();
            e.stopImmediatePropagation();
            insertAtCursor(text);
        }
    }

    inputEl.addEventListener('paste', function (e) {

    }, true);

    var atSearchTimer = null;

    function showAtDropdown(items) {
        atItems = items;
        atActiveIndex = -1;
        if (!items || items.length === 0) { hideAtDropdown(); return; }
        atDropdown.innerHTML = '';
        items.forEach(function (item, i) {

            row.addEventListener('click', function () { selectAtItem(i); });
            atDropdown.appendChild(row);
        });
        atDropdown.classList.add('visible');

    }

    function hideAtDropdown() {
        atDropdown.classList.remove('visible');

        atItems = [];

    }

    function setAtActive(index) {
        var items = atDropdown.querySelectorAll('.at-dropdown-item');
        items.forEach(function (el) { el.classList.remove('active'); });
        if (index >= 0 && index < items.length) {
            atActiveIndex = index;
            items[index].classList.add('active');
            items[index].scrollIntoView({ block: 'nearest' });
        }
    }

    function selectAtItem(index) {
        var item = atItems[index];
        if (!item) return;
        var result = getAtQuery();
        if (!result) { hideAtDropdown(); return; }
        var before = inputEl.value.substring(0, result.start);
        var after = inputEl.value.substring(inputEl.selectionStart);
        var insert = '@' + item.insertText + ' ';
        inputEl.value = before + insert + after;
        var newPos = before.length + insert.length;
        inputEl.selectionStart = inputEl.selectionEnd = newPos;
        inputEl.focus();
        hideAtDropdown();
        clearTimeout(saveTimer);
        saveTimer = setTimeout(saveState, 500);
    }

    inputEl.addEventListener('input', function () {

            hideAtDropdown();

    inputEl.addEventListener('keydown', function (e) {
        if ((e.metaKey || e.ctrlKey) && !e.shiftKey && e.key === 'v' && extensionClipboardReady()) {
            e.preventDefault();
            e.stopImmediatePropagation();
            requestClipboardPaste();
            return;
        }
        if (atVisible) {
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                setAtActive(atActiveIndex < atItems.length - 1 ? atActiveIndex + 1 : 0);
                return;
            }
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                setAtActive(atActiveIndex > 0 ? atActiveIndex - 1 : atItems.length - 1);
                return;
            }
            if ((e.key === 'Enter' || e.key === 'Tab') && atActiveIndex >= 0) {
                e.preventDefault();
                selectAtItem(atActiveIndex);
                return;
            }
            if (e.key === 'Escape') {
                e.preventDefault();

                return;

    // ── Transport (bridge primary, WebSocket fallback) ───

    function handleProtocolMessage(msg) {
        if (!msg || !msg.type) return;
        if (msg.type === 'pong') {
            lastPongAt = Date.now();
            if (msg.hub) applyHubSnapshot(msg.hub);
            finishUserPing(msg.body);
            exec(state.handleMessage(msg));
            renderConnectionHealth();
            return;
        }
        if (msg.type === 'connection_established') {
            if (useBridge) {
                if (bridgeGate.shouldInitFromConnectionEstablished()) onBridgeConnected(msg);
                return;
            }
            applyConnectionInfo(msg);
            if (msg.version) {
                var vl = document.getElementById('versionLabel');
                if (vl) vl.textContent = 'v' + msg.version;
            }
            requestStateSync();
            return;
        }
        exec(state.handleMessage(msg));
        if (msg.type === 'state_sync') {
            if (msg.hub) applyHubSnapshot(msg.hub);
            renderConnectionHealth();
        }
        if (msg.type === 'session_updated') {
            debugLog('session_updated received session=' + (msg.session_id || '(legacy)')
                + ' project=' + (msg.project_directory || '(none)'));
            if (msg.session_id && transportReady()) {
                transportSend({ type: 'session_displayed', session_id: msg.session_id });
            }
        }
        if (msg.type === 'clipboard_write_ok') {
            window.__mcpPendingCopyText = null;
            showToast('Copied');
        } else if (msg.type === 'clipboard_write_err') {
            var pendingCopy = window.__mcpPendingCopyText || '';
            window.__mcpPendingCopyText = null;
            console.warn('mcp-feedback clipboard-write err:', msg.error || 'unknown');
            if (pendingCopy && navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(pendingCopy).then(function () {
                    showToast('Copied');
                }).catch(function () {
                    showToast('Copy failed');
                });
            } else {
                showToast('Copy failed');
            }
        } else if (msg.type === 'clipboard_paste_result' && msg.request_id === window.__mcpPendingPasteId) {
            window.__mcpPendingPasteId = null;
            window.__mcpWsPastePending = false;
            window.__mcpWsPasteAt = 0;
            if (msg.image) {
                addImage(msg.image);
                showToast('Pasted');
            } else if (msg.text) {
                insertAtCursor(msg.text);
                showToast('Pasted');
            } else {
                readImagesFromNavigatorClipboard().then(function (blobs) {
                    if (!blobs.length) {
                        console.warn('mcp-feedback clipboard-paste: no image or text');
                        return;
                    }
                    return Promise.all(blobs.map(pasteImageSource)).then(function () {
                        showToast('Pasted');
                    });
                }).catch(function (err) {
                    console.warn('mcp-feedback clipboard-paste fallback failed:', err && err.message ? err.message : err);
                });
            }
        }
    }

    function updateConnectionLabels(msg) {
        if (!msg) return;
        if (msg.version) {
            var vl = document.getElementById('versionLabel');
            if (vl) vl.textContent = 'v' + msg.version;
        }
        if (msg.port) {
            connectedHubPid = msg.pid || connectedHubPid;
            wsUrl = PS.PanelState.resolveWsUrl(wsUrl, msg.port);
            wsPortEl.textContent = ':' + msg.port;
            var label = 'Connected :' + msg.port;
            if (msg.pid) label += ' pid=' + msg.pid;
            setWsStatus('connected', label);
        }
    }

    function onBridgeConnected(msg) {
        var snap = bridgeGate.snapshot();
        debugLog('onBridgeConnected port=' + (msg && msg.port) + ' v=' + (msg && msg.version)
            + ' init=' + snap.initialized);
        var action = bridgeGate.onBridgeConnected();
        window.__mcpBootstrapped = true;
        reconnectAttempts = 0;
        if (action.labels) updateConnectionLabels(msg);
        if (!action.register && !action.stateSync) return;
        if (action.register) {
            transportSend({ type: 'register', clientType: 'webview' });
        }
        flushOutboundQueue();
        if (action.stateSync) requestStateSync();
        renderConnectionHealth();
    }

    function requestStateSync() {
        debugLog('requestStateSync');
        exec(state.handleMessage({ type: 'connection_established' }));
    }

    function connect() {
        if (useBridge) {
            if (bridgeGate.isReady()) return;
            debugLog('connect hub-connect');
            setWsStatus('connecting');
            vscode.postMessage({ type: 'hub-connect' });
            return;
        }
        if (ws && ws.readyState === WebSocket.OPEN) return;
        if (!PS.PanelState.isValidWsUrl(wsUrl)) {
            setWsStatus('connecting', 'Waiting for server port...');
            return;
        }
        setWsStatus('connecting');
        try {
            ws = new WebSocket(wsUrl);
            ws.onopen = function () {
                reconnectAttempts = 0;
                var port = getWsPort();
                setWsStatus('connected', port ? 'Connected :' + port : 'Connected');
                transportSend({ type: 'register', clientType: 'webview' });
                flushOutboundQueue();
            };
            ws.onmessage = function (e) {
                try {
                    handleProtocolMessage(JSON.parse(e.data));
                } catch (err) { console.error(err); }
            };
            ws.onclose = function () {
                bridgeGate.resetForReconnect();
                setWsStatus('disconnected');
                scheduleReconnect();
            };
            ws.onerror = function () {
                console.warn('mcp-feedback ws error url=' + wsUrl);
                setWsStatus('disconnected');
            };
        } catch (err) {
            console.warn('mcp-feedback ws connect failed url=' + wsUrl, err);
            setWsStatus('disconnected');
            scheduleReconnect();
        }
    }

    function scheduleReconnect() {
        if (useBridge) {
            setTimeout(function () { connect(); }, 1000);
            return;
        }
        var delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
        reconnectAttempts++;
        setWsStatus('connecting', 'Retry #' + reconnectAttempts + ' (' + (delay / 1000).toFixed(0) + 's)');
        setTimeout(connect, delay);
    }

    function applyServerInfo(msg) {
        if (!msg || !msg.port) return;
        if (useBridge) {
            updateConnectionLabels(msg);
            if (bridgeGate.shouldInitFromServerInfo()) onBridgeConnected(msg);
            return;
        }
        if (msg.version) {
            var vl = document.getElementById('versionLabel');
            if (vl) vl.textContent = 'v' + msg.version;
        }
        var synced = PS.PanelState.resolveWsUrl(wsUrl, msg.port);
        wsUrl = synced;
        window.__mcpBootstrapped = true;
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            connect();
        }
    }

    function bootstrapConnection() {
        connect();
    }

    // ── Extension Messages ──────────────────────────────

    window.addEventListener('message', function (event) {
        var msg = event.data;
        if (msg.type === 'reconnect' || msg.type === 'hub-connect') {
            forceReconnect();
        } else if (msg.type === 'please-reconnect') {
            debugLog('please-reconnect from extension');
            forceReconnect();
        } else if (msg.type === 'debug-report') {
            lastExtensionDebugReport = msg.report || null;
            debugLog('debug-report received');
            renderDebugPanel();
        } else if (msg.type === 'bridge-connected') {
            onBridgeConnected(msg);
        } else if (msg.type === 'hub-message') {
            handleProtocolMessage(msg.data);
        } else if (msg.type === 'server-info') {
            applyServerInfo(msg);
        } else if (msg.type === 'focus-input') {
            inputEl.focus();
        } else if (msg.type === 'clipboard-paste-result') {
            if (msg.requestId === window.__mcpPendingPasteId) {
                window.__mcpPendingPasteId = null;
                if (msg.image) addImage(msg.image);
                else if (msg.text) insertAtCursor(msg.text);
            }
        } else if (msg.type === 'at-results') {
            showAtDropdown(msg.items || []);
        }
    });

    // ── Heartbeat ───────────────────────────────────────

    setInterval(function () {
        if (transportReady()) {
            transportSend({ type: 'ping' });
        }
        renderConnectionHealth();
    }, 30000);

    // ── Init ────────────────────────────────────────────

    if (window.McpThemeContrast) { window.McpThemeContrast.applyMcpTheme(); }
    bootstrapErudaPanel();
    loadState();
    if (state.getActiveSession() && state.getActiveSession().inputDraft) {
        inputEl.value = state.getActiveSession().inputDraft;
    }
    renderTabs();
    renderMessages();
    renderPending();
    renderStagedImages();
    updateSendButton();
    syncSettings();
    if (vscode) {
        vscode.postMessage({ type: 'webview-ready' });
        debugLog('webview-ready posted');
    } else {
        bootstrapConnection();
    }
})();
</script>
</body>
</html>
