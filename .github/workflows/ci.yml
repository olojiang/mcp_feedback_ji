name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: cd mcp-server && npm ci

      - run: npm test

      - run: npm run test:coverage

      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
